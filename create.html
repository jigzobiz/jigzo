<style>
  #root { min-height:60vh; }

    font-family:Archia,-apple-system,BlinkMacSystemFont,sans-serif; color:rgba(28,25,19,0.45); font-size:14px; }
  /* orbiting-badge loader (shared "preparing your reveal" animation) */
  .jz-orbit { display:flex; flex-direction:column; align-items:center; gap:22px; }
  .jz-orbit__ring { position:relative; width:120px; height:120px; animation:jzOrbitSpin 2.8s linear infinite; }
  .jz-orbit__arm  { position:absolute; left:50%; top:50%; width:0; height:0; }
  .jz-orbit__arm:nth-child(1){ transform:rotate(0deg); }
  .jz-orbit__arm:nth-child(2){ transform:rotate(120deg); }
  .jz-orbit__arm:nth-child(3){ transform:rotate(240deg); }
  .jz-orbit__badge { position:absolute; left:8px; top:-23px; width:46px; height:46px;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.5)); animation:jzBadgeSpin 2.2s ease-in-out infinite; }
  .jz-orbit__badge svg { display:block; width:100%; height:100%; overflow:visible; }
  .jz-orbit__label { font-family:"JetBrains Mono",monospace; font-size:11px; font-weight:500; letter-spacing:0.28em; text-transform:uppercase; color:rgba(28,25,19,0.45); }
  @keyframes jzOrbitSpin { to { transform:rotate(360deg); } }
  @keyframes jzBadgeSpin { 0%{ transform:rotate(0deg) scale(0.9); } 50%{ transform:rotate(180deg) scale(1.1); } 100%{ transform:rotate(360deg) scale(0.9); } }
  @media (prefers-reduced-motion: reduce){ .jz-orbit__ring,.jz-orbit__badge{ animation:none; } }
</style>

function phoneDigits(v) { return (v || "").replace(/\D/g, ""); }
function phoneValid(v) { const d = phoneDigits(v); return d.length >= 7 && d.length <= 12; }

function formatPrice(n) {
  return "$" + (n % 1 === 0 ? n.toFixed(0) : n.toFixed(2));
}

function interpolateInsightsPreview(text, sender, recipient) {
  const s = (sender && sender.trim()) ? sender.trim() : "Sender";
  const r = (recipient && recipient.trim()) ? recipient.trim() : "Receiver";
  return text.replace(/\{sender\}/g, s).replace(/\{recipient\}/g, r);
}

function packageForRecipientCount(count) {
  if (count <= 1) return PACK_OPTIONS[0];
  if (count <= 5) return PACK_OPTIONS[1];
  if (count <= 20) return PACK_OPTIONS[2];
  return PACK_OPTIONS[3];
}

function StepProgressBar({ step }) {
  const labels = ["Create", "Personalize", "Send", "Review & Pay"];
  return (
    <div style={{ marginBottom: 28 }}>
      <div className="progress-bar">
        {[1, 2, 3, 4].map((i) => (
          <div key={i} className={`progress-bar__seg ${i <= step ? "progress-bar__seg--active" : ""}`} />
        ))}
      </div>
      <div style={{ fontSize: 12.5, fontWeight: 600, color: T.ink, letterSpacing: "0.02em" }} aria-current="step">
        Step {step} of 4 — {labels[step - 1]}
      </div>
    </div>
  );
}

function JigzoSenderFlow() {
  const [currentStep, setCurrentStep] = useState(1);
  const [imgSrc, setImgSrc] = useState(null);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [zoom, setZoom] = useState(1);
  const [cropData, setCropData] = useState(null);
  const [pieceCount, setPieceCount] = useState(18);
  const [difficultyOpen, setDifficultyOpen] = useState(false);
  const [primaryRecipientName, setPrimaryRecipientName] = useState("");
  const [message, setMessage] = useState("");
  const [helpWriteOpen, setHelpWriteOpen] = useState(false);
  const [occasion, setOccasion] = useState("");
  const [tone, setTone] = useState("");
  const [recipients, setRecipients] = useState([{ name: "", phone: "", country: COUNTRIES[0] }]);
  const [senderName, setSenderName] = useState("");
  const [senderPhone, setSenderPhone] = useState("");
  const [senderCountry, setSenderCountry] = useState(COUNTRIES[0]);
  const [revealIdentity, setRevealIdentity] = useState(true);
  const [selectedUpgrades, setSelectedUpgrades] = useState([]);
  const [termsAgreed, setTermsAgreed] = useState(false);
  const [revealStage, setRevealStage] = useState(false);
  const [isProcessing, setIsProcessing] = useState(false);
  const [isSuccess, setIsSuccess] = useState(false);

  // Validation touches
  const [senderPhoneTouched, setSenderPhoneTouched] = useState(false);
  const [recipientsTouched, setRecipientsTouched] = useState({});

  // Threshold Notice
  const [thresholdNotice, setThresholdNotice] = useState(null);

  // Plans accordion state
  const [plansOpen, setPlansOpen] = useState(false);

  const dragRef = useRef(null);
  const pointersRef = useRef(new Map());
  const pinchRef = useRef(null);
  const fileInputRef = useRef(null);
  const cropFrameRef = useRef(null);
  const imgElRef = useRef(null);

  useEffect(() => {
    window.scrollTo(0, 0);
    // Force reset browser viewport zoom on step transition
    const meta = document.querySelector('meta[name="viewport"]');
    if (meta) {
      const orig = meta.getAttribute("content");
      meta.setAttribute("content", "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0");
      setTimeout(() => {
        meta.setAttribute("content", orig || "width=device-width, initial-scale=1.0");
      }, 150);
    }
  }, [currentStep, isProcessing, isSuccess]);

  // Sync recipient #1 name with primary recipient name
  const handlePrimaryRecipientNameChange = (val) => {
    setPrimaryRecipientName(val);
    setRecipients(prev => {
      const next = [...prev];
      if (next[0]) {
        next[0].name = val;
      } else {
        next[0] = { name: val, phone: "", country: COUNTRIES[0] };
      }
      return next;
    });
  };

  const currentPack = useMemo(() => {
    return packageForRecipientCount(recipients.length);
  }, [recipients.length]);

  const BASE_PRICE = currentPack.price;

  // Threshold notice trigger
  const prevPackIdRef = useRef(currentPack.id);
  useEffect(() => {
    if (prevPackIdRef.current !== currentPack.id) {
      const newPack = currentPack;
      setThresholdNotice(`Updated to ${newPack.label} — ${formatPrice(newPack.price)}`);
      const t = setTimeout(() => setThresholdNotice(null), 3000);
      prevPackIdRef.current = currentPack.id;
      return () => clearTimeout(t);
    }
  }, [currentPack]);

  const dims = useMemo(() => PIECE_OPTIONS.find((p) => p.count === pieceCount) || { cols: 3, rows: 6, label: "Classic" }, [pieceCount]);
  const cols = dims.cols, rows = dims.rows;
  const edgeMap = useMemo(() => buildEdgeMap(cols, rows, 1337), [cols, rows]);
  const BOARD_W = 360;
  const BOARD_H = 640;
  const pieceW = BOARD_W / cols;
  const pieceH = BOARD_H / rows;
  const MX = pieceH * 0.5;
  const MY = pieceW * 0.5;
  const viewBox = `${-MX} ${-MY} ${BOARD_W + 2 * MX} ${BOARD_H + 2 * MY}`;

  const scramble = useMemo(() => {
    const rand = mulberry32(97 + (cols * 31 + rows) * 131);
    const slots = [];
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) slots.push({ r, c });
    for (let i = slots.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      const t = slots[i]; slots[i] = slots[j]; slots[j] = t;
    }
    const jx = pieceW * 0.14, jy = pieceH * 0.14;
    return slots.map((home, idx) => ({
      r: home.r, c: home.c,
      x: (idx % cols) * pieceW + (rand() - 0.5) * 2 * jx,
      y: Math.floor(idx / cols) * pieceH + (rand() - 0.5) * 2 * jy,
      rot: (rand() - 0.5) * 2 * 14,
    }));
  }, [cols, rows, pieceW, pieceH]);

  const handleFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (e) => { setImgSrc(e.target.result); setZoom(1); setPan({ x: 0, y: 0 }); setCropData(null); };
    reader.readAsDataURL(file);
  };

  const clampPan = (px, py, z) => {
    const frame = cropFrameRef.current, imgEl = imgElRef.current;
    if (!frame || !imgEl || !imgEl.naturalWidth) return { x: px, y: py };
    const Wf = frame.clientWidth, Hf = frame.clientHeight;
    const cs = Math.min(Wf / imgEl.naturalWidth, Hf / imgEl.naturalHeight);
    const dW = imgEl.naturalWidth * cs * z, dH = imgEl.naturalHeight * cs * z;
    const ox = Math.max(0, (dW - Wf) / 2), oy = Math.max(0, (dH - Hf) / 2);
    return { x: Math.max(-ox, Math.min(ox, px)), y: Math.max(-oy, Math.min(oy, py)) };
  };

  const onPointerDown = (e) => {
    const f = cropFrameRef.current;
    if (f && e.pointerType === "touch" && f.setPointerCapture) { try { f.setPointerCapture(e.pointerId); } catch (_) {} }
    pointersRef.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    const size = pointersRef.current.size;
    if (size === 2) {
      const pts = [...pointersRef.current.values()];
      const a = pts[0], b = pts[1];
      const r = f.getBoundingClientRect();
      pinchRef.current = {
        startDist: Math.hypot(a.x - b.x, a.y - b.y) || 1,
        startZoom: zoom,
        startPan: { ...pan },
        startMid: { x: (a.x + b.x) / 2 - r.left, y: (a.y + b.y) / 2 - r.top },
        C: { x: r.width / 2, y: r.height / 2 },
      };
      dragRef.current = null;
    } else if (size === 1) {
      dragRef.current = { startX: e.clientX, startY: e.clientY, origPan: { ...pan } };
    }
  };

  const onPointerMove = (e) => {
    if (!pointersRef.current.has(e.pointerId)) return;
    pointersRef.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointersRef.current.size >= 2 && pinchRef.current) {
      const pts = [...pointersRef.current.values()];
      const a = pts[0], b = pts[1];
      const f = cropFrameRef.current, r = f.getBoundingClientRect();
      const dist = Math.hypot(a.x - b.x, a.y - b.y) || 1;
      const curMid = { x: (a.x + b.x) / 2 - r.left, y: (a.y + b.y) / 2 - r.top };
      const g = pinchRef.current;
      const z1 = Math.max(1, Math.min(3, g.startZoom * (dist / g.startDist)));
      const ratio = z1 / g.startZoom;
      const px = (curMid.x - g.C.x) - ratio * (g.startMid.x - g.C.x - g.startPan.x);
      const py = (curMid.y - g.C.y) - ratio * (g.startMid.y - g.C.y - g.startPan.y);
      setZoom(z1);
      setPan(clampPan(px, py, z1));
      return;
    }
    if (!dragRef.current) return;
    const dx = e.clientX - dragRef.current.startX;
    const dy = e.clientY - dragRef.current.startY;
    setPan(clampPan(dragRef.current.origPan.x + dx, dragRef.current.origPan.y + dy, zoom));
  };

  const onPointerUp = (e) => {
    const f = cropFrameRef.current;
    if (e && e.pointerId != null) {
      if (f && f.releasePointerCapture) { try { f.releasePointerCapture(e.pointerId); } catch (_) {} }
      pointersRef.current.delete(e.pointerId);
    } else { pointersRef.current.clear(); }
    if (pointersRef.current.size < 2) pinchRef.current = null;
    if (pointersRef.current.size === 1) {
      const only = [...pointersRef.current.values()][0];
      dragRef.current = { startX: only.x, startY: only.y, origPan: { ...pan } };
    } else if (pointersRef.current.size === 0) {
      dragRef.current = null;
    }
  };

  const captureCrop = useCallback(() => {
    const imgEl = imgElRef.current;
    const frame = cropFrameRef.current;
    if (!imgEl || !frame || !imgEl.naturalWidth) return;
    const rect = frame.getBoundingClientRect();
    const Wf = rect.width, Hf = rect.height;
    const Wi = imgEl.naturalWidth, Hi = imgEl.naturalHeight;
    const OUT_W = 540, OUT_H = 960;
    const k = OUT_W / Wf;
    const containScale = Math.min(Wf / Wi, Hf / Hi);
    const containDw = Wi * containScale, containDh = Hi * containScale;
    const cx = Wf / 2, cy = Hf / 2;
    const p0x = (Wf - containDw) / 2, p0y = (Hf - containDh) / 2;
    const pf0x = cx + (p0x - cx) * zoom + pan.x;
    const pf0y = cy + (p0y - cy) * zoom + pan.y;
    const sEff = k * containScale * zoom;
    const canvas = document.createElement("canvas");
    canvas.width = OUT_W; canvas.height = OUT_H;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#1C1913";
    ctx.fillRect(0, 0, OUT_W, OUT_H);
    try {
      ctx.save();
      ctx.filter = "blur(26px) brightness(0.5)";
      const cover = Math.max(OUT_W / Wi, OUT_H / Hi);
      const cw = Wi * cover, ch = Hi * cover;
      ctx.drawImage(imgEl, (OUT_W - cw) / 2, (OUT_H - ch) / 2, cw, ch);
      ctx.restore();
    } catch (e) {}
    ctx.drawImage(imgEl, k * pf0x, k * pf0y, sEff * Wi, sEff * Hi);
    setCropData(canvas.toDataURL("image/jpeg", 0.92));
  }, [zoom, pan]);

  const occasionObj = OCCASIONS.find((o) => o.id === occasion);
  const toneObj = TONES.find((t) => t.id === tone);

  const getUpgradePrice = (uId) => {
    if (uId === "insights") {
      return currentPack.insightsPrice;
    }
    return 1;
  };

  const toggleUpgrade = (id) => setSelectedUpgrades((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : prev.concat(id));
  const upgradesTotal = selectedUpgrades.reduce((sum, id) => sum + getUpgradePrice(id), 0);
  const grandTotal = BASE_PRICE + upgradesTotal;

  const senderValid = phoneValid(senderCountry.dial + senderPhone);

  const recipientNumbers = useMemo(() => {
    return recipients.map(r => r.country.dial + r.phone);
  }, [recipients]);

  const duplicateNumbers = useMemo(() => {
    return recipientNumbers.filter((item, index) => recipientNumbers.indexOf(item) !== index && item.length > 5);
  }, [recipientNumbers]);

  const isDuplicate = (phone) => duplicateNumbers.includes(phone);

  const recipientsValid = useMemo(() => {
    if (recipients.length === 0) return false;
    const phoneSet = new Set();
    for (const r of recipients) {
      if (!r.name.trim()) return false;
      const fullPhone = r.country.dial + r.phone;
      if (!phoneValid(fullPhone)) return false;
      if (phoneSet.has(fullPhone)) return false;
      phoneSet.add(fullPhone);
    }
    return true;
  }, [recipients]);

  const step3Ready = senderName && senderValid && recipientsValid;

  const pickCombo = (occ, tn) => {
    const nextSug = suggestedMessage(occ, tn);
    const prevSug = suggestedMessage(occasion, tone);
    if (!message.trim() || message === prevSug) setMessage(nextSug);
  };

  const useSuggested = () => {
    const sug = suggestedMessage(occasion, tone);
    if (sug) setMessage(sug);
  };

  const savePayload = () => {
    const payload = {
      cropData, message, fromName: senderName, toName: recipients[0]?.name || "",
      occasion, occasionLabel: occasionObj ? occasionObj.label : "",
      tone, pieceCount, revealIdentity, recipients,
    };
    try { localStorage.setItem("jigzo:test-puzzle", JSON.stringify(payload)); } catch (e) {}
  };

  useEffect(() => {
    if (!isProcessing) return;
    savePayload();
    const t = setTimeout(() => {
      setIsProcessing(false);
      setIsSuccess(true);
    }, 2600);
    return () => clearTimeout(t);
  }, [isProcessing]);

  // View state handlers
  const handleStep1Continue = () => {
    if (cropData) {
      setCurrentStep(2);
    }
  };

  const handleStep2Continue = () => {
    if (primaryRecipientName.trim() && message.trim()) {
      setCurrentStep(3);
    }
  };

  const handleStep3Continue = () => {
    if (step3Ready) {
      setCurrentStep(4);
    }
  };

  const handleBack = () => {
    if (currentStep > 1) {
      setCurrentStep(currentStep - 1);
    }
  };

  const currentDifficulty = useMemo(() => {
    return PIECE_OPTIONS.find(p => p.count === pieceCount) || PIECE_OPTIONS[2];
  }, [pieceCount]);

  if (isProcessing) {
    return (
      <div style={{ fontFamily: "Archia, sans-serif", color: T.ink, padding: "34px 20px 70px" }}>
        <div style={{ maxWidth: 480, margin: "0 auto", textAlign: "center", paddingTop: 50 }}>
          <div className="jz-orbit" role="status" aria-label="Preparing" style={{ marginBottom: 28 }}>
            <div className="jz-orbit__ring">
              <div className="jz-orbit__arm"><div className="jz-orbit__badge"><PuzzleBadge size={46} /></div></div>
              <div className="jz-orbit__arm"><div className="jz-orbit__badge"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#FAF8EC"/><circle cx="50" cy="50" r="48.3" fill="none" stroke="rgba(5,5,5,0.07)" strokeWidth="1"/><g fill="#050505"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
              <div className="jz-orbit__arm"><div className="jz-orbit__badge"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#111110"/><circle cx="50" cy="50" r="48.3" fill="none" stroke="rgba(208,160,54,0.5)" strokeWidth="1"/><g fill="#FAF8EC"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
            </div>
          </div>
          <h1 style={{ fontSize: 22, fontWeight: 500, margin: "0 0 8px", letterSpacing: "-0.01em" }}>Preparing your JIGZO…</h1>
          <p style={{ fontSize: 14, color: T.ink60 }}>This usually takes only a few seconds.</p>
        </div>
      </div>
    );
  }

  if (isSuccess) {
    const displayRecipientsText = recipients.length === 1 
      ? `${recipients[0].name || "They"} will receive a WhatsApp from JIGZO with a puzzle to solve. Your message unlocks with the final piece.`
      : "Your recipients will receive a WhatsApp from JIGZO with a puzzle to solve. Your message unlocks with the final piece.";
    
    return (
      <div style={{ fontFamily: "Archia, sans-serif", color: T.ink, padding: "34px 20px 70px" }}>
        <div style={{ maxWidth: 480, margin: "0 auto", textAlign: "center", paddingTop: 30 }}>
          <div style={{ width: 84, height: 84, margin: "0 auto 24px", borderRadius: "50%", background: T.ink,
            display: "flex", alignItems: "center", justifycontent: "center", animation: "ckPop 0.5s cubic-bezier(.2,.8,.2,1) both", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
              <path d="M11 22 L18 29 L31 14" stroke={T.goldWarm} strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"
                strokeDasharray="40" strokeDashoffset="40" style={{ animation: "ckDraw 0.5s ease 0.35s forwards" }} />
            </svg>
          </div>
          <h1 style={{ fontSize: 27, fontWeight: 300, margin: "0 0 12px", letterSpacing: "-0.02em" }}>Your JIGZO has been delivered.</h1>
          <p style={{ fontSize: 14.5, color: T.ink66, margin: "0 auto 26px", maxWidth: 360, lineHeight: 1.6 }}>
            {displayRecipientsText}
          </p>
          <PrimaryButton onClick={() => window.open("receive.html", "_blank")} style={{ width: "100%" }}>Open the reveal (local test)</PrimaryButton>
          <p style={{ fontSize: 11.5, color: T.ink50, marginTop: 12, lineHeight: 1.5 }}>
            Prototype simulation — did not process a real payment or send a real WhatsApp. Click above to test the solve flow locally.
          </p>
        </div>
      </div>
    );
  }

  return (
    <div style={{ fontFamily: "Archia, sans-serif", color: T.ink, padding: "34px 20px 70px" }}>
      <style>{`
        ::placeholder { color: ${T.ink40}; }
        textarea, input, select { font-family: 'Archia', sans-serif; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @keyframes ckPop { 0%{ transform:scale(0); } 70%{ transform:scale(1.12); } 100%{ transform:scale(1); } }
        @keyframes ckDraw { to { stroke-dashoffset:0; } }
      `}</style>

      <div style={{ maxWidth: 480, margin: "0 auto" }}>
        <StepProgressBar step={currentStep} />

        {/* ============ STEP 1 — CREATE ============ */}
        {currentStep === 1 && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 24, fontWeight: 300, margin: "0 0 8px", letterSpacing: "-0.02em" }}>Create your puzzle</h1>
            <p style={{ fontSize: 14.5, color: T.ink66, margin: "0 0 20px", lineHeight: 1.5 }}>
              Choose the photo they’ll uncover. We’ll turn it into the puzzle that hides your message.
            </p>

            {/* Choose photo view */}
            {!imgSrc && (
              <div
                onClick={() => fileInputRef.current && fileInputRef.current.click()}
                onDrop={(e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
                onDragOver={(e) => e.preventDefault()}
                style={{ border: "1.5px dashed " + T.ink15, borderRadius: 18, padding: "48px 20px",
                  textAlign: "center", cursor: "pointer", background: T.card }}>
                <div style={{ width: 54, height: 54, margin: "0 auto 14px", filter: "drop-shadow(0 6px 14px rgba(124,76,34,0.35))" }}><PuzzleBadge size={54} /></div>
                <div style={{ fontWeight: 600, fontSize: 15.5, marginBottom: 4 }}>Upload a photo</div>
                <div style={{ fontSize: 12.5, color: T.ink50 }}>JPG or PNG</div>
              </div>
            )}

            {/* Crop photo view */}
            {imgSrc && !cropData && (
              <div>
                <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
                  <div ref={cropFrameRef}
                    style={{ position: "relative", width: "100%", maxWidth: 300, aspectRatio: "9 / 16", borderRadius: 20,
                      overflow: "hidden", background: T.ink, cursor: "grab", touchAction: "none", margin: "0 auto",
                      boxShadow: "0 0 0 2px " + T.bg + ", 0 0 0 3px " + T.ink08 }}
                    onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp} onPointerLeave={onPointerUp}>
                    <img src={imgSrc} alt="" aria-hidden="true" draggable={false}
                      style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover",
                        filter: "blur(18px) brightness(0.5)", transform: "scale(1.15)", userSelect: "none", pointerEvents: "none" }} />
                    <img ref={imgElRef} src={imgSrc} alt="" draggable={false}
                      style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", objectFit: "contain",
                        transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: "center",
                        userSelect: "none", pointerEvents: "none" }} />
                    {[{ top: 10, left: 10 }, { top: 10, right: 10 }, { bottom: 10, left: 10 }, { bottom: 10, right: 10 }].map((pos, i) => (
                      <div key={i} style={{ position: "absolute", width: 16, height: 16, border: "2px solid " + T.goldBright, pointerEvents: "none",
                        ...(pos.top !== undefined ? { top: pos.top, borderBottom: "none" } : { bottom: pos.bottom, borderTop: "none" }),
                        ...(pos.left !== undefined ? { left: pos.left, borderRight: "none" } : { right: pos.right, borderLeft: "none" }) }} />
                    ))}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "10px 0 20px" }}>
                  <span style={{ fontSize: 18 }}>−</span>
                  <input type="range" min="1" max="3" step="0.01" value={zoom}
                    onChange={(e) => { const z = parseFloat(e.target.value); setZoom(z); setPan((p) => clampPan(p.x, p.y, z)); }}
                    style={{ flex: 1, accentColor: T.gold }} />
                  <span style={{ fontSize: 18 }}>+</span>
                </div>
              </div>
            )}

            {/* Review cropped photo view */}
            {cropData && (
              <div>
                <div style={{ display: "flex", gap: 14, alignItems: "center", padding: 12, borderRadius: 14, background: T.card, border: "1px solid " + T.ink08, marginBottom: 14 }}>
                  <img src={cropData} alt="Cropped preview" style={{ width: 54, height: 96, objectFit: "cover", borderRadius: 8 }} />
                  <div>

            <div className="footer-nav">
              <GhostButton onClick={handleBack}>Back</GhostButton>
              <PrimaryButton onClick={() => setIsProcessing(true)} disabled={!termsAgreed} style={{ flex: 1 }}>Pay &amp; Send</PrimaryButton>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<JigzoSenderFlow />);
  </script>
  <script>
    (function () {
      var root = document.getElementById("root");
      function fail(msg){ root.innerHTML='<div style="font-family:sans-serif;color:#7a1c1c;max-width:520px;margin:80px auto;padding:0 24px;text-align:center;line-height:1.5"><strong>Couldn’t load the puzzle maker.</strong><br>'+msg+'</div>'; }
      if (typeof Babel==="undefined"||typeof React==="undefined"||typeof ReactDOM==="undefined"){ fail("A required library failed to load (CDN/connection)."); return; }
      try {
        var src = document.getElementById("jigzo-src").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        var s = document.createElement("script"); s.textContent = out; document.body.appendChild(s);
      } catch (err) { console.error(err); fail((err&&err.message)?err.message:String(err)); }
    })();
  </script>
</body>
