<title>Create your JIGZO reveal</title>
<!-- create.html — sender flow. No-build runner compiled in-browser with the
     classic JSX runtime. Content/copy rewrite layered on the existing crop +
     piece-geometry mechanics (both preserved verbatim). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  #root { min-height:60vh; }
  .jz-boot { min-height:60vh; display:flex; align-items:center; justify-content:center;
    font-family:Archia,-apple-system,BlinkMacSystemFont,sans-serif; color:rgba(28,25,19,0.45); font-size:14px; }
  /* orbiting-badge loader (shared "preparing your reveal" animation) */
  .jz-orbit { display:flex; flex-direction:column; align-items:center; gap:22px; }
  .jz-orbit__ring { position:relative; width:120px; height:120px; animation:jzOrbitSpin 2.8s linear infinite; }
  .jz-orbit__arm  { position:absolute; left:50%; top:50%; width:0; height:0; }
  .jz-orbit__arm:nth-child(1){ transform:rotate(0deg); }
  .jz-orbit__arm:nth-child(2){ transform:rotate(120deg); }
  .jz-orbit__arm:nth-child(3){ transform:rotate(240deg); }
  .jz-orbit__badge { position:absolute; left:8px; top:-23px; width:46px; height:46px;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.5)); animation:jzBadgeSpin 2.2s ease-in-out infinite; }
  .jz-orbit__badge svg { display:block; width:100%; height:100%; overflow:visible; }
  .jz-orbit__label { font-family:"JetBrains Mono",monospace; font-size:11px; font-weight:500; letter-spacing:0.28em; text-transform:uppercase; color:rgba(28,25,19,0.45); }
  @keyframes jzOrbitSpin { to { transform:rotate(360deg); } }
  @keyframes jzBadgeSpin { 0%{ transform:rotate(0deg) scale(0.9); } 50%{ transform:rotate(180deg) scale(1.1); } 100%{ transform:rotate(360deg) scale(0.9); } }
  @media (prefers-reduced-motion: reduce){ .jz-orbit__ring,.jz-orbit__badge{ animation:none; } }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="js/puzzle-shape.js"></script>
</head>
<body>
  <!-- header — matches the homepage nav treatment -->
  <header class="nav">
    <div class="nav__inner">
      <a href="index.html" aria-label="Jigzo home"><img class="nav__logo" src="assets/JIGZO-Logo-Black.png" alt="JIGZO"></a>
      <a class="btn btn-ghost" href="index.html">Home</a>
    </div>

  <div id="root"><div class="jz-boot">
    <div class="jz-orbit" role="status" aria-label="Loading">
      <div class="jz-orbit__ring">
        <div class="jz-orbit__arm"><div class="jz-orbit__badge"><svg viewBox="0 0 100 100"><defs><linearGradient id="jzbG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F6DC93"/><stop offset=".42" stop-color="#D0A036"/><stop offset="1" stop-color="#7C4C22"/></linearGradient></defs><circle cx="50" cy="50" r="49" fill="url(#jzbG)"/><g fill="#050505"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
        <div class="jz-orbit__arm"><div class="jz-orbit__badge"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#FAF8EC"/><circle cx="50" cy="50" r="48.3" fill="none" stroke="rgba(5,5,5,0.07)" stroke-width="1"/><g fill="#050505"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
        <div class="jz-orbit__arm"><div class="jz-orbit__badge"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#111110"/><circle cx="50" cy="50" r="48.3" fill="none" stroke="rgba(208,160,54,0.5)" stroke-width="1"/><g fill="#FAF8EC"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
      </div>
      <div class="jz-orbit__label">Preparing your maker</div>

  </div></div>

  <!-- footer — matches the homepage disclaimer -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand">
        <img class="footer__logo" src="assets/JIGZO-Logo-Black.png" alt="JIGZO">
        <span class="footer__by">Product by Jigpuzzle</span>
      </div>
      <div class="footer__tag">Some words deserve a moment before they're read.</div>
    </div>

  <script type="text/plain" id="jigzo-src">
const { useState, useRef, useCallback, useMemo, useEffect } = React;

/* Palette — matches the JIGZO redesign (warm cream / ink + golds). */
const T = {
  bg: "#F4EDDF", card: "#FBF7EE", ink: "#1C1913",
  gold: "#B8935A", goldDeep: "#8a6d3a", goldWarm: "#E6C67F", goldBright: "#D0A036",
  ink74: "rgba(28,25,19,0.74)", ink66: "rgba(28,25,19,0.66)", ink60: "rgba(28,25,19,0.6)",
  ink50: "rgba(28,25,19,0.5)", ink40: "rgba(28,25,19,0.4)", ink15: "rgba(28,25,19,0.15)", ink08: "rgba(28,25,19,0.08)",
  mono: "'JetBrains Mono', ui-monospace, monospace",
  serif: "'Playfair Display', Georgia, serif",

/* Four difficulty tiers. Grids are non-square (portrait board) so pieces stay
   roughly square. Classic (18) is the recommended default. */
const PIECE_OPTIONS = [
  { count: 6,  cols: 2, rows: 3, label: "Extra Easy",  pieces: "6 pieces",  copy: "Perfect for a quick surprise." },
  { count: 15, cols: 3, rows: 5, label: "Easy",        pieces: "15 pieces", copy: "A light challenge with a quick reveal." },
  { count: 18, cols: 3, rows: 6, label: "Classic",     pieces: "18 pieces", copy: "Just the right balance of fun and anticipation.", recommended: true },
  { count: 28, cols: 4, rows: 7, label: "Challenging", pieces: "28 pieces", copy: "For those who enjoy making the moment last." },
];

const OCCASIONS = [
  { id: "love", label: "Love" },
  { id: "birthday", label: "Birthday" },
  { id: "anniversary", label: "Anniversary" },
  { id: "congrats", label: "Congratulations" },
  { id: "sorry", label: "I'm Sorry" },

  { id: "getwell", label: "Get Well Soon" },
  { id: "thankyou", label: "Thank You" },
  { id: "newbaby", label: "New Baby" },
  { id: "justbecause", label: "Just Because" },
];
const TONES = [

  { id: "funny", label: "Funny" },

/* Suggested-message library — 10 occasions x 8 tones. */
const MESSAGES = {

  },

    funny: "You're not getting older... you're just becoming a classic.",
    deep: "I hope this year brings you moments you'll remember long after you've forgotten today's gifts.",
    short: "Today belongs to you. Enjoy every second.",
    poetic: "May this year leave beautiful fingerprints on your soul.",

    friendship: "Life became more fun the day we became friends.",
    playful: "Eat the cake. Blame tomorrow.",
  },
  anniversary: {
    romantic: "Every year with you feels less like time passing and more like memories collecting.",
    funny: "We survived another year of my terrible jokes. That's real commitment.",

    short: "Still my favorite person.",
    poetic: "Some promises grow more beautiful every sunrise.",

    family: "Just a reminder that you're loved more than you know.",

    playful: "Surprise! This puzzle contains 100% appreciation.",

function suggestedMessage(occ, tone) {
  return (occ && tone && MESSAGES[occ] && MESSAGES[occ][tone]) || "";
}

/* Country list for the WhatsApp number fields (flag + dial code). */
const COUNTRIES = [
  { code: "BH", flag: "🇧🇭", dial: "+973", name: "Bahrain" },
  { code: "SA", flag: "🇸🇦", dial: "+966", name: "Saudi Arabia" },
  { code: "AE", flag: "🇦🇪", dial: "+971", name: "UAE" },
  { code: "KW", flag: "🇰🇼", dial: "+965", name: "Kuwait" },
  { code: "QA", flag: "🇶🇦", dial: "+974", name: "Qatar" },
  { code: "OM", flag: "🇴🇲", dial: "+968", name: "Oman" },
  { code: "JO", flag: "🇯🇴", dial: "+962", name: "Jordan" },
  { code: "EG", flag: "🇪🇬", dial: "+20",  name: "Egypt" },
  { code: "GB", flag: "🇬🇧", dial: "+44",  name: "United Kingdom" },
  { code: "US", flag: "🇺🇸", dial: "+1",   name: "United States" },
  { code: "IN", flag: "🇮🇳", dial: "+91",  name: "India" },
  { code: "PK", flag: "🇵🇰", dial: "+92",  name: "Pakistan" },
  { code: "TR", flag: "🇹🇷", dial: "+90",  name: "Turkey" },
  { code: "FR", flag: "🇫🇷", dial: "+33",  name: "France" },
  { code: "DE", flag: "🇩🇪", dial: "+49",  name: "Germany" },
];
/* Placeholder validation: no WhatsApp Business API wired yet, so we validate the
   number's shape and treat a well-formed number as reachable. Swap in a real
   WhatsApp lookup later. */
function phoneDigits(v) { return (v || "").replace(/\D/g, ""); }
function phoneValid(v) { const d = phoneDigits(v); return d.length >= 7 && d.length <= 12; }

/* Pricing — placeholder helper for future geo/currency localization. */
function priceText() { return "From $5"; }

/* ---- shared JIGZO puzzle badge (the app icon, used for the uploader) ---- */
function PuzzleBadge({ size }) {
  return (
    <svg viewBox="0 0 100 100" width={size} height={size} style={{ display: "block" }}>
      <defs>
        <linearGradient id="pbG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#F6DC93" /><stop offset="0.42" stopColor="#D0A036" /><stop offset="1" stopColor="#7C4C22" /></linearGradient>
        <radialGradient id="pbS" cx="0.34" cy="0.28" r="0.75"><stop offset="0" stopColor="rgba(255,255,255,0.42)" /><stop offset="0.6" stopColor="rgba(255,255,255,0)" /></radialGradient>
      </defs>
      <circle cx="50" cy="50" r="49" fill="url(#pbG)" /><circle cx="50" cy="50" r="49" fill="url(#pbS)" />
      <g fill="#050505"><rect x="33" y="33" width="34" height="34" rx="8" /><circle cx="50" cy="29" r="8.6" /><circle cx="50" cy="71" r="8.6" /><circle cx="29" cy="50" r="8.6" /><circle cx="71" cy="50" r="8.6" /></g>
    </svg>
  );
}

/* ---- the reveal card face (matches receive.html's redesigned reveal) ---- */
function RevealFace({ photo, toName, fromName, message }) {
  return (
    <div style={{ position: "relative", width: "100%", height: "100%", overflow: "hidden",
      background: photo ? `#050505 center/cover no-repeat url(${photo})` : "#100e0b" }}>
      {/* colours/scrim/shadows kept in exact sync with receive.html's reveal card */}
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(120% 100% at 50% 42%, rgba(23,19,13,0.34), rgba(5,5,5,0.76) 78%)" }} />
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center",
        justifyContent: "center", textAlign: "center", padding: "9% 11%" }}>
        {toName ? (
          <div style={{ fontFamily: T.mono, fontWeight: 500, fontSize: 12.5, letterSpacing: "0.1em", color: T.goldWarm, marginBottom: 18, textShadow: "0 1px 4px rgba(5,5,5,0.8)" }}>{toName}</div>
        ) : null}
        <div style={{ fontFamily: T.serif, fontStyle: "italic", fontWeight: 400, fontSize: 20, lineHeight: 1.32,
          color: "#F3ECDD", whiteSpace: "pre-line", maxWidth: "22ch", textShadow: "0 1px 3px rgba(5,5,5,0.92), 0 2px 22px rgba(5,5,5,0.6)" }}>
          {message || "Your message will appear here."}
        </div>
        <div style={{ width: 44, height: 2, marginTop: 18, background: "linear-gradient(90deg, rgba(208,160,54,0), #D0A036, rgba(208,160,54,0))" }} />
        {fromName ? (
          <div style={{ fontFamily: T.mono, fontWeight: 500, fontSize: 12, letterSpacing: "0.08em", color: "rgba(238,232,220,0.82)", marginTop: 14, textShadow: "0 1px 4px rgba(5,5,5,0.8)" }}>{fromName}</div>
        ) : null}
      </div>
    </div>
  );
}

/* ---- live WhatsApp notification preview (always sent from the JIGZO brand) ---- */
function waMessage(senderName, showIdentity, receiverName) {
  const who = (showIdentity && senderName) ? senderName : "Someone";
  const greetName = (receiverName && receiverName.trim()) ? receiverName.trim() : "there";
  return "Hi " + greetName + ", " + who + " left something special for you. There's a message waiting behind a little challenge. Solve the puzzle to uncover it. 🧩 Open your JIGZO";
}
function WhatsAppPreview({ senderName, showIdentity, receiverName }) {
  return (
    <div style={{ borderRadius: 16, overflow: "hidden", border: "1px solid " + T.ink08, background: "#E9E2D3" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: "#075E54", color: "#fff" }}>
        <img src="assets/JIGZO-Icon-Cream.svg" alt="JIGZO" style={{ width: 30, height: 30, borderRadius: "50%", flex: "none", display: "block" }} />
        <div style={{ display: "flex", flexDirection: "column", lineHeight: 1.15 }}>
          <span style={{ fontWeight: 700, fontSize: 14 }}>JIGZO</span>
          <span style={{ fontSize: 10.5, opacity: 0.8 }}>Business account</span>
        </div>
      </div>
      <div style={{ padding: "16px 12px", background: "#EDE4D3" }}>
        <div style={{ maxWidth: "88%", background: "#fff", borderRadius: "2px 12px 12px 12px", padding: "9px 11px 7px",
          boxShadow: "0 1px 1px rgba(0,0,0,0.12)", fontSize: 13.5, lineHeight: 1.45, color: "#111" }}>
          {waMessage(senderName, showIdentity, receiverName)}
          <div style={{ marginTop: 8, borderRadius: 8, overflow: "hidden", border: "1px solid rgba(0,0,0,0.08)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9, padding: 9, background: "#F6F1E7" }}>
              <img src="assets/JIGZO-Icon-Cream.svg" alt="JIGZO" style={{ width: 34, height: 34, borderRadius: "50%", flex: "none", display: "block" }} />
              <div style={{ minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 12.5, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>Open your JIGZO</div>
                <div style={{ fontSize: 11.5, color: T.goldDeep }}>jigzo.biz/r/…</div>
              </div>
            </div>
          </div>
          <div style={{ textAlign: "right", fontSize: 10, color: "rgba(0,0,0,0.4)", marginTop: 3 }}>now ✓✓</div>
        </div>
      </div>
    </div>
  );
}

function StepRail({ idx }) {
  const labels = ["Photo", "Difficulty", "People", "Message", "Preview", "Checkout"];
  return (
    <div style={{ display: "flex", gap: 6, marginBottom: 28, flexWrap: "wrap" }}>
      {labels.map((s, i) => (
        <div key={s} style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: i <= idx ? T.gold : T.ink15, transition: "background 0.3s" }} />
          <span style={{ fontSize: 11, letterSpacing: "0.06em", textTransform: "uppercase", color: i === idx ? T.ink : T.ink40, fontWeight: i === idx ? 600 : 400 }}>{s}</span>
          {i < labels.length - 1 && <div style={{ width: 14, height: 1, background: T.ink08, marginLeft: 4 }} />}
        </div>
      ))}
    </div>
  );
}

function PrimaryButton({ children, onClick, disabled, style }) {
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ background: disabled ? T.ink15 : T.ink, color: disabled ? T.ink40 : T.bg, border: "none",
        borderRadius: 999, padding: "14px 28px", fontSize: 15, fontWeight: 700, cursor: disabled ? "not-allowed" : "pointer",
        transition: "transform 0.15s ease, opacity 0.15s ease", fontFamily: "Archia, sans-serif", ...style }}
      onMouseDown={(e) => { if (!disabled) e.currentTarget.style.transform = "scale(0.98)"; }}
      onMouseUp={(e) => { e.currentTarget.style.transform = "scale(1)"; }}>
      {children}
    </button>
  );
}
function GhostButton({ children, onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ background: "transparent", color: disabled ? T.ink40 : T.ink, border: "1px solid " + T.ink15,
        borderRadius: 999, padding: "14px 24px", fontSize: 15, fontWeight: 500, cursor: disabled ? "not-allowed" : "pointer", fontFamily: "Archia, sans-serif" }}>
      {children}
    </button>
  );
}

const inputStyle = {
  width: "100%", padding: "13px 14px", borderRadius: 12, border: "1.5px solid " + T.ink15,
  fontSize: 14.5, background: T.card, outline: "none", color: T.ink,
};

/* Sender/Receiver contact block: name + WhatsApp number with country + dial code. */
function ContactBlock({ title, name, setName, country, setCountry, phone, setPhone }) {
  const [touched, setTouched] = useState(false);
  const valid = phoneValid(country.dial + phone);
  return (
    <div style={{ padding: 16, borderRadius: 14, background: T.card, border: "1px solid " + T.ink08, marginBottom: 14 }}>
      <div style={{ fontWeight: 600, fontSize: 13, letterSpacing: "0.02em", marginBottom: 12, color: T.ink }}>{title}</div>
      <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 6, color: T.ink74 }}>Name</label>
      <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Name"
        style={{ ...inputStyle, marginBottom: 14 }} />
      <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 6, color: T.ink74 }}>WhatsApp number</label>
      <div style={{ display: "flex", gap: 8 }}>
        <select value={country.code}
          onChange={(e) => setCountry(COUNTRIES.find((c) => c.code === e.target.value))}
          style={{ ...inputStyle, width: "auto", flex: "none", padding: "13px 8px" }}>
          {COUNTRIES.map((c) => <option key={c.code} value={c.code}>{c.flag} {c.dial}</option>)}
        </select>
        <input value={phone} onChange={(e) => setPhone(e.target.value.replace(/[^\d ]/g, ""))} onBlur={() => setTouched(true)}
          placeholder="Phone number" inputMode="tel" style={{ ...inputStyle, flex: 1 }} />
      </div>
      {touched && phone && !valid ? (
        <div style={{ fontSize: 12, color: "#b23b3b", marginTop: 7 }}>This number doesn't appear to have WhatsApp.</div>
      ) : null}
    </div>
  );
}

function JigzoSenderFlow() {
  const [step, setStep] = useState("upload");
  const [imgSrc, setImgSrc] = useState(null);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [zoom, setZoom] = useState(1);
  const [cropData, setCropData] = useState(null); // final captured crop as dataURL
  const [pieceCount, setPieceCount] = useState(18); // Classic default
  const [senderName, setSenderName] = useState("");
  const [receiverName, setReceiverName] = useState("");
  const [senderCountry, setSenderCountry] = useState(COUNTRIES[0]);
  const [receiverCountry, setReceiverCountry] = useState(COUNTRIES[0]);
  const [senderPhone, setSenderPhone] = useState("");
  const [receiverPhone, setReceiverPhone] = useState("");
  const [revealIdentity, setRevealIdentity] = useState(true);
  const [occasion, setOccasion] = useState("");
  const [tone, setTone] = useState("");
  const [message, setMessage] = useState("");
  const [revealStage, setRevealStage] = useState(false);

  const dragRef = useRef(null);
  const fileInputRef = useRef(null);
  const cropFrameRef = useRef(null);
  const imgElRef = useRef(null);

  const dims = useMemo(() => PIECE_OPTIONS.find((p) => p.count === pieceCount) || { cols: 3, rows: 6 }, [pieceCount]);
  const cols = dims.cols, rows = dims.rows;
  const edgeMap = useMemo(() => buildEdgeMap(cols, rows, 1337), [cols, rows]);
  const BOARD_W = 360;
  const BOARD_H = 640;               // 9:16
  const pieceW = BOARD_W / cols;
  const pieceH = BOARD_H / rows;
  const MX = pieceH * 0.5;
  const MY = pieceW * 0.5;
  const viewBox = `${-MX} ${-MY} ${BOARD_W + 2 * MX} ${BOARD_H + 2 * MY}`;

  /* deterministic scrambled layout for the "locked" preview (PROTECTED geometry) */
  const scramble = useMemo(() => {
    const rand = mulberry32(97 + (cols * 31 + rows) * 131);
    const slots = [];
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) slots.push({ r, c });
    for (let i = slots.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      const t = slots[i]; slots[i] = slots[j]; slots[j] = t;
    }
    const jx = pieceW * 0.14, jy = pieceH * 0.14;
    return slots.map((home, idx) => ({
      r: home.r, c: home.c,
      x: (idx % cols) * pieceW + (rand() - 0.5) * 2 * jx,
      y: Math.floor(idx / cols) * pieceH + (rand() - 0.5) * 2 * jy,
      rot: (rand() - 0.5) * 2 * 14,
    }));
  }, [cols, rows, pieceW, pieceH]);

  /* ---- PROTECTED: crop capture mechanics (unchanged) ---- */
  const handleFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (e) => { setImgSrc(e.target.result); setZoom(1); setPan({ x: 0, y: 0 }); setStep("crop"); };
    reader.readAsDataURL(file);
  };
  // Clamp pan so the (uniformly-scaled) photo can't be dragged past its own
  // edges into empty space. At contain baseline (zoom 1) there's no room to pan.
  const clampPan = (px, py, z) => {
    const frame = cropFrameRef.current, imgEl = imgElRef.current;
    if (!frame || !imgEl || !imgEl.naturalWidth) return { x: px, y: py };
    const Wf = frame.clientWidth, Hf = frame.clientHeight;
    const cs = Math.min(Wf / imgEl.naturalWidth, Hf / imgEl.naturalHeight); // uniform contain scale
    const dW = imgEl.naturalWidth * cs * z, dH = imgEl.naturalHeight * cs * z;
    const ox = Math.max(0, (dW - Wf) / 2), oy = Math.max(0, (dH - Hf) / 2);
    return { x: Math.max(-ox, Math.min(ox, px)), y: Math.max(-oy, Math.min(oy, py)) };
  };
  const onPointerDown = (e) => { dragRef.current = { startX: e.clientX, startY: e.clientY, origPan: { ...pan } }; };
  const onPointerMove = (e) => {
    if (!dragRef.current) return;
    const dx = e.clientX - dragRef.current.startX;
    const dy = e.clientY - dragRef.current.startY;
    setPan(clampPan(dragRef.current.origPan.x + dx, dragRef.current.origPan.y + dy, zoom));
  };
  const onPointerUp = () => { dragRef.current = null; };
  const captureCrop = useCallback(() => {
    const imgEl = imgElRef.current;
    const frame = cropFrameRef.current;
    if (!imgEl || !frame || !imgEl.naturalWidth) return;
    const rect = frame.getBoundingClientRect();
    const Wf = rect.width, Hf = rect.height;                 // frame size (9:16)
    const Wi = imgEl.naturalWidth, Hi = imgEl.naturalHeight; // photo natural size

    const OUT_W = 540, OUT_H = 960;      // 9:16 portrait output
    const k = OUT_W / Wf;                // frame px -> output px (uniform; both 9:16)

    // Match the on-screen CSS exactly: object-fit:contain (uniform), then
    // scale(zoom) about centre + translate(pan). One scale factor for both axes.
    const containScale = Math.min(Wf / Wi, Hf / Hi);
    const containDw = Wi * containScale, containDh = Hi * containScale;
    const cx = Wf / 2, cy = Hf / 2;
    const p0x = (Wf - containDw) / 2, p0y = (Hf - containDh) / 2;   // contain top-left
    const pf0x = cx + (p0x - cx) * zoom + pan.x;                    // after zoom+pan
    const pf0y = cy + (p0y - cy) * zoom + pan.y;
    const sEff = k * containScale * zoom;                          // uniform output scale

    const canvas = document.createElement("canvas");
    canvas.width = OUT_W; canvas.height = OUT_H;
    const ctx = canvas.getContext("2d");

    // fill gaps with a blurred, darkened cover of the same photo (never stretch)
    ctx.fillStyle = "#1C1913";
    ctx.fillRect(0, 0, OUT_W, OUT_H);
    try {
      ctx.save();
      ctx.filter = "blur(26px) brightness(0.5)";
      const cover = Math.max(OUT_W / Wi, OUT_H / Hi);   // uniform cover
      const cw = Wi * cover, ch = Hi * cover;
      ctx.drawImage(imgEl, (OUT_W - cw) / 2, (OUT_H - ch) / 2, cw, ch);
      ctx.restore();
    } catch (e) { /* canvas filter unsupported — the brand fill stands in */ }

    // the photo itself, scaled UNIFORMLY (width/height share sEff — no distortion)
    ctx.drawImage(imgEl, k * pf0x, k * pf0y, sEff * Wi, sEff * Hi);

    setCropData(canvas.toDataURL("image/jpeg", 0.92));
    setStep("pieces");
  }, [zoom, pan]);
  /* ---- end protected crop mechanics ---- */

  const occasionObj = OCCASIONS.find((o) => o.id === occasion);
  const toneObj = TONES.find((t) => t.id === tone);
  const senderValid = phoneValid(senderCountry.dial + senderPhone);
  const receiverValid = phoneValid(receiverCountry.dial + receiverPhone);
  const contactsReady = senderName && receiverName && senderValid && receiverValid;

  // when occasion+tone chosen, offer the suggested message (unless user has edited)
  const pickCombo = (occ, tn) => {
    const nextSug = suggestedMessage(occ, tn);
    const prevSug = suggestedMessage(occasion, tone);
    if (!message.trim() || message === prevSug) setMessage(nextSug);
  };

  const savePayload = () => {
    const payload = {
      cropData, message, fromName: senderName, toName: receiverName,
      occasion, occasionLabel: occasionObj ? occasionObj.label : "",
      tone, pieceCount, revealIdentity,
    };
    try { localStorage.setItem("jigzo:test-puzzle", JSON.stringify(payload)); } catch (e) {}
  };

  // Processing -> Success (placeholder; no real payment/delivery yet)
  useEffect(() => {
    if (step !== "processing") return;
    savePayload();
    const t = setTimeout(() => setStep("success"), 2600);
    return () => clearTimeout(t);
  }, [step]);

  const railIdx = { upload: 0, crop: 0, pieces: 1, contacts: 2, message: 3, preview: 4, ready: 5, checkout: 5 }[step];

  return (
    <div style={{ fontFamily: "Archia, sans-serif", color: T.ink, padding: "34px 20px 70px" }}>
      <style>{`
        ::placeholder { color: ${T.ink40}; }
        textarea, input, select { font-family: 'Archia', sans-serif; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @keyframes ckPop { 0%{ transform:scale(0); } 70%{ transform:scale(1.12); } 100%{ transform:scale(1); } }
        @keyframes ckDraw { to { stroke-dashoffset:0; } }
      `}</style>

      <div style={{ maxWidth: 480, margin: "0 auto" }}>
        {railIdx != null && <StepRail idx={railIdx} />}

        {/* ============ STEP 1 — PHOTO (upload) ============ */}
        {step === "upload" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 27, fontWeight: 300, margin: "0 0 12px", letterSpacing: "-0.02em", lineHeight: 1.1 }}>
              Some messages deserve more than a notification.
            </h1>
            <p style={{ fontSize: 15, color: T.ink66, margin: "0 0 26px", lineHeight: 1.55 }}>
              Upload a photo. Hide your words. We'll deliver a puzzle they'll have to solve before they can read them.
            </p>
            <div style={{ fontSize: 13, fontWeight: 600, color: T.goldDeep, marginBottom: 12, letterSpacing: "0.01em" }}>
              Choose the photo they'll uncover.
            </div>
            <div
              onClick={() => fileInputRef.current && fileInputRef.current.click()}
              onDrop={(e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
              onDragOver={(e) => e.preventDefault()}
              style={{ border: "1.5px dashed " + T.ink15, borderRadius: 18, padding: "48px 20px",
                textAlign: "center", cursor: "pointer", background: T.card }}>
              <div style={{ width: 54, height: 54, margin: "0 auto 14px", filter: "drop-shadow(0 6px 14px rgba(124,76,34,0.35))" }}><PuzzleBadge size={54} /></div>
              <div style={{ fontWeight: 600, fontSize: 15.5, marginBottom: 4 }}>Upload a photo</div>
              <div style={{ fontSize: 12.5, color: T.ink50 }}>JPG or PNG — portrait works best</div>
            </div>
            <input ref={fileInputRef} type="file" accept="image/*" style={{ display: "none" }}
              onChange={(e) => handleFile(e.target.files[0])} />
          </div>
        )}

        {/* ============ STEP 1 — PHOTO (crop) — PROTECTED crop UI ============ */}
        {step === "crop" && imgSrc && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 22, fontWeight: 500, margin: "0 0 6px", letterSpacing: "-0.01em" }}>Frame the moment</h1>
            <p style={{ fontSize: 13.5, color: T.ink60, margin: "0 0 20px" }}>
              Zoom, drag to reposition. This portrait frame is exactly what gets sent.

            <div style={{ display: "flex", justifyContent: "center" }}>
              <div ref={cropFrameRef}

                onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}>
                {/* blurred fill so empty space never requires stretching the photo */}
                <img src={imgSrc} alt="" aria-hidden="true" draggable={false}
                  style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover",
                    filter: "blur(18px) brightness(0.5)", transform: "scale(1.15)", userSelect: "none", pointerEvents: "none" }} />
                {/* the photo — always scaled UNIFORMLY (contain), then zoom + pan */}
                <img ref={imgElRef} src={imgSrc} alt="" draggable={false}

                    transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: "center",
                    userSelect: "none", pointerEvents: "none" }} />
                {[{ top: 10, left: 10 }, { top: 10, right: 10 }, { bottom: 10, left: 10 }, { bottom: 10, right: 10 }].map((pos, i) => (
                  <div key={i} style={{ position: "absolute", width: 16, height: 16, border: "2px solid " + T.goldBright, pointerEvents: "none",

              </div>
            </div>

              <PrimaryButton onClick={captureCrop} style={{ flex: 1 }}>Continue</PrimaryButton>
            </div>
          </div>

        {/* ============ STEP 2 — DIFFICULTY ============ */}
        {step === "pieces" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 24, fontWeight: 300, margin: "0 0 6px", letterSpacing: "-0.02em" }}>Choose the challenge.</h1>
            <p style={{ fontSize: 14, color: T.ink66, margin: "0 0 20px" }}>More pieces mean more anticipation before the final reveal.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {PIECE_OPTIONS.map((opt) => {
                const sel = pieceCount === opt.count;

                        {opt.recommended && (
                          <span style={{ fontFamily: T.mono, fontWeight: 500, fontSize: 9.5, letterSpacing: "0.08em", textTransform: "uppercase",
                            color: T.ink, background: T.goldWarm, borderRadius: 100, padding: "3px 8px" }}>★ Recommended</span>
                        )}
                      </div>
                      <div style={{ fontSize: 12.5, color: T.ink60, lineHeight: 1.4 }}>{opt.copy}</div>

                    <div style={{ width: 18, height: 18, borderRadius: "50%", border: "1.5px solid " + T.ink, flex: "none",

                );

            </div>

            </div>
            <p style={{ fontSize: 11.5, color: T.ink50, textAlign: "center", marginTop: 10 }}>
              {revealStage ? "Tap to see the scrambled puzzle again" : "Tap to see how it solves and reveals"}
            </p>

            <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
              <GhostButton onClick={() => setStep("message")}>Back</GhostButton>
              <PrimaryButton onClick={() => setStep("ready")} style={{ flex: 1 }}>Continue</PrimaryButton>
            </div>
          </div>
        )}

        {/* ============ STEP 6 — READY ============ */}
        {step === "ready" && (
          <div style={{ animation: "fadeUp 0.4s ease", textAlign: "center", paddingTop: 20 }}>
            <div style={{ width: 66, height: 66, margin: "0 auto 22px", filter: "drop-shadow(0 8px 18px rgba(124,76,34,0.4))" }}><PuzzleBadge size={66} /></div>
            <h1 style={{ fontSize: 28, fontWeight: 300, margin: "0 0 12px", letterSpacing: "-0.02em" }}>Everything is ready.</h1>
            <p style={{ fontSize: 15, color: T.ink66, margin: "0 auto 22px", maxWidth: 380, lineHeight: 1.6 }}>
              Your puzzle is prepared. Once you continue we'll securely create your private reveal and deliver it through JIGZO WhatsApp.
            </p>
            <div style={{ fontFamily: T.mono, fontSize: 13, letterSpacing: "0.04em", color: T.goldDeep, marginBottom: 26 }}>
              {priceText()}
            </div>
            <PrimaryButton onClick={() => setStep("checkout")} style={{ width: "100%" }}>Create &amp; Send</PrimaryButton>
            <div style={{ marginTop: 12 }}><GhostButton onClick={() => setStep("preview")}>Back</GhostButton></div>
          </div>
        )}

        {/* ============ STEP 7 — SECURE CHECKOUT (placeholder) ============ */}
        {step === "checkout" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 26, fontWeight: 300, margin: "0 0 18px", letterSpacing: "-0.02em", textAlign: "center" }}>Almost there.</h1>
            <div style={{ padding: 18, borderRadius: 16, background: T.card, border: "1px solid " + T.ink08, marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 14 }}>
                {cropData && <img src={cropData} alt="" style={{ width: 52, height: 92, objectFit: "cover", borderRadius: 8, flex: "none" }} />}
                <div style={{ fontSize: 13.5, lineHeight: 1.7 }}>
                  <div><strong>Occasion</strong> · {occasionObj ? occasionObj.label : "—"}{toneObj ? " · " + toneObj.label : ""}</div>
                  <div><strong>To</strong> · {receiverName || "—"}</div>
                  <div><strong>Difficulty</strong> · {dims.label} ({pieceCount} pieces)</div>
                  <div><strong>Sender shown</strong> · {revealIdentity ? "Yes" : "Anonymous"}</div>
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderTop: "1px solid " + T.ink08, paddingTop: 12 }}>
                <span style={{ fontSize: 14, color: T.ink60 }}>Total</span>
                <span style={{ fontFamily: T.mono, fontSize: 16, color: T.ink }}>{priceText()}</span>
              </div>
            </div>

            <PrimaryButton onClick={() => setStep("processing")} style={{ width: "100%" }}>Pay &amp; Send</PrimaryButton>
            <div style={{ marginTop: 12, textAlign: "center" }}><GhostButton onClick={() => setStep("ready")}>Back</GhostButton></div>
          </div>
        )}

        {/* ============ STEP 8 — PROCESSING ============ */}
        {step === "processing" && (
          <div style={{ animation: "fadeUp 0.4s ease", textAlign: "center", paddingTop: 30 }}>
            <div className="jz-orbit" role="status" aria-label="Preparing" style={{ marginBottom: 28 }}>
              <div className="jz-orbit__ring">
                <div className="jz-orbit__arm"><div className="jz-orbit__badge"><PuzzleBadge size={46} /></div></div>
                <div className="jz-orbit__arm"><div className="jz-orbit__badge"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#FAF8EC"/><circle cx="50" cy="50" r="48.3" fill="none" stroke="rgba(5,5,5,0.07)" strokeWidth="1"/><g fill="#050505"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
                <div className="jz-orbit__arm"><div className="jz-orbit__badge"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#111110"/><circle cx="50" cy="50" r="48.3" fill="none" stroke="rgba(208,160,54,0.5)" strokeWidth="1"/><g fill="#FAF8EC"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
              </div>
            </div>
            <h1 style={{ fontSize: 22, fontWeight: 500, margin: "0 0 8px", letterSpacing: "-0.01em" }}>Your reveal is being prepared…</h1>
            <p style={{ fontSize: 14, color: T.ink60 }}>This usually takes only a few seconds.</p>
          </div>
        )}

        {/* ============ STEP 9 — SUCCESS ============ */}
        {step === "success" && (
          <div style={{ animation: "fadeUp 0.4s ease", textAlign: "center", paddingTop: 30 }}>
            <div style={{ width: 84, height: 84, margin: "0 auto 24px", borderRadius: "50%", background: T.ink,
              display: "flex", alignItems: "center", justifyContent: "center", animation: "ckPop 0.5s cubic-bezier(.2,.8,.2,1) both" }}>
              <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
                <path d="M11 22 L18 29 L31 14" stroke={T.goldWarm} strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"
                  strokeDasharray="40" strokeDashoffset="40" style={{ animation: "ckDraw 0.5s ease 0.35s forwards" }} />
              </svg>
            </div>
            <h1 style={{ fontSize: 27, fontWeight: 300, margin: "0 0 12px", letterSpacing: "-0.02em" }}>Your JIGZO has been delivered.</h1>
            <p style={{ fontSize: 14.5, color: T.ink66, margin: "0 auto 26px", maxWidth: 360, lineHeight: 1.6 }}>
              {receiverName || "They"} will get a WhatsApp from JIGZO with a puzzle to solve — your words unlock at the final piece.
            </p>
            <PrimaryButton onClick={() => window.open("receive.html", "_blank")} style={{ width: "100%" }}>Open the reveal (local test)</PrimaryButton>
            <p style={{ fontSize: 11.5, color: T.ink50, marginTop: 12, lineHeight: 1.5 }}>
              Local test — opens the receiver experience (solve → reveal) in a new tab. No real WhatsApp send or payment yet.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<JigzoSenderFlow />);
  </script>
  <script>
    (function () {
      var root = document.getElementById("root");
      function fail(msg){ root.innerHTML='<div style="font-family:sans-serif;color:#7a1c1c;max-width:520px;margin:80px auto;padding:0 24px;text-align:center;line-height:1.5"><strong>Couldn’t load the puzzle maker.</strong><br>'+msg+'</div>'; }
      if (typeof Babel==="undefined"||typeof React==="undefined"||typeof ReactDOM==="undefined"){ fail("A required library failed to load (CDN/connection)."); return; }
      try {
        var src = document.getElementById("jigzo-src").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        var s = document.createElement("script"); s.textContent = out; document.body.appendChild(s);
      } catch (err) { console.error(err); fail((err&&err.message)?err.message:String(err)); }
    })();
  </script>
</body>
</html>
