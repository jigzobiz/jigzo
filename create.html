<style>
  #root { min-height:60vh; }
  .jz-boot { min-height:60vh; display:flex; align-items:center; justify-content:center;
    font-family:Archia,-apple-system,BlinkMacSystemFont,sans-serif; color:rgba(28,25,19,0.45); font-size:14px; }
  /* orbiting-badge loader (shared "preparing your reveal" animation) */
  .jz-orbit { display:flex; flex-direction:column; align-items:center; gap:22px; }
  .jz-orbit__ring { position:relative; width:120px; height:120px; animation:jzOrbitSpin 2.8s linear infinite; }
  .jz-orbit__arm  { position:absolute; left:50%; top:50%; width:0; height:0; }
  .jz-orbit__arm:nth-child(1){ transform:rotate(0deg); }
  .jz-orbit__arm:nth-child(2){ transform:rotate(120deg); }
  .jz-orbit__arm:nth-child(3){ transform:rotate(240deg); }
  .jz-orbit__badge { position:absolute; left:8px; top:-23px; width:46px; height:46px;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.5)); animation:jzBadgeSpin 2.2s ease-in-out infinite; }
  .jz-orbit__badge svg { display:block; width:100%; height:100%; overflow:visible; }
  .jz-orbit__label { font-family:"JetBrains Mono",monospace; font-size:11px; font-weight:500; letter-spacing:0.28em; text-transform:uppercase; color:rgba(28,25,19,0.45); }
  @keyframes jzOrbitSpin { to { transform:rotate(360deg); } }
  @keyframes jzBadgeSpin { 0%{ transform:rotate(0deg) scale(0.9); } 50%{ transform:rotate(180deg) scale(1.1); } 100%{ transform:rotate(360deg) scale(0.9); } }
  @media (prefers-reduced-motion: reduce){ .jz-orbit__ring,.jz-orbit__badge{ animation:none; } }
</style>

function phoneDigits(v) { return (v || "").replace(/\D/g, ""); }
function phoneValid(v) { const d = phoneDigits(v); return d.length >= 7 && d.length <= 12; }

function formatPrice(n) {
  return "$" + (n % 1 === 0 ? n.toFixed(0) : n.toFixed(2));
}

function interpolateInsightsPreview(text, sender, recipient) {
  const s = (sender && sender.trim()) ? sender.trim() : "Sender";
  const r = (recipient && recipient.trim()) ? recipient.trim() : "Receiver";
  return text.replace(/\{sender\}/g, s).replace(/\{recipient\}/g, r);
}

/* ---- the reveal card face ---- */

/* ---- live WhatsApp notification preview ---- */
function WhatsAppPreview({ senderName, showIdentity, receiverName, message }) {

  const now = new Date();
  let hh = now.getHours(); const ap = hh >= 12 ? "PM" : "AM"; hh = hh % 12 || 12;
  const stamp = hh + ":" + String(now.getMinutes()).padStart(2, "0") + " " + ap;

    "<circle cx='108' cy='23' r='1.4' fill='#CBBBA4'/><circle cx='116' cy='23' r='1.4' fill='#CBBBA4'/>" +
    "<rect x='16' y='96' width='26' height='16' rx='7'/><path d='M42 100h5a3 3 0 0 1 0 8h-5'/><path d='M22 92q2-4 0-7M30 92q2-4 0-7'/>" +

    "<rect x='60' y='60' width='30' height='20' rx='3'/><circle cx='75' cy='70' r='6'/><path d='M66 60l3-4h12l3 4'/>" +
    "</g></svg>"
  ) + "\")";

  let contentNode;
  if (message != null) {
    contentNode = <span style={{ whiteSpace: "pre-wrap" }}>{message}</span>;
  } else {
    const who = (showIdentity && senderName && senderName.trim()) ? senderName.trim() : "Someone";
    const greetName = (receiverName && receiverName.trim()) ? receiverName.trim() : "receiver";
    contentNode = (
      <span style={{ whiteSpace: "pre-wrap" }}>
        Hi {greetName}, {who} has created a surprise just for you. Solve the puzzle to reveal what's waiting inside. 🧩{" "}
        <span style={{ color: "#0066cc", textDecoration: "underline", fontWeight: "600", cursor: "pointer" }}>
          Discover Your Surprise
        </span>
      </span>
    );
  }

  return (
    <div style={{ borderRadius: 16, overflow: "hidden", border: "1px solid " + T.ink08, background: "#E4DDD3", fontFamily: WA_SANS }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 12px",

        <div style={{ display: "flex", alignItems: "center", gap: 2, flex: "none", fontSize: 17 }}>
          <span style={{ fontSize: 22, lineHeight: 1, marginTop: -2 }}>‹</span>
          <span style={{ fontSize: 14, fontWeight: 600 }}>1</span>
        </div>
        <img src="assets/JIGZO-Icon-Cream.svg" alt="JIGZO"
          style={{ width: 38, height: 38, borderRadius: "50%", flex: "none", display: "block", border: "1px solid rgba(0,0,0,0.1)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 5, minWidth: 0, flex: 1 }}>
          <span style={{ fontWeight: 600, fontSize: 15, color: "#111B21", whiteSpace: "nowrap" }}>JIGZO</span>
          <span style={{ width: 16, height: 16, borderRadius: "50%", background: "#25D366", flex: "none",
            display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 700, lineHeight: 1 }}>✓</span>
        </div>
      </div>
      <div style={{ padding: "16px 12px 18px", backgroundColor: "#E4DDD3", backgroundImage: doodle }}>
        <div style={{ position: "relative", maxWidth: "86%", background: "#FFFFFF", borderRadius: "0 8px 8px 8px",

}

  const labels = ["Photo", "Difficulty", "People", "Message", "Preview", "Almost There", "Checkout"];

    <div style={{ display: "flex", gap: 6, marginBottom: 28, flexWrap: "wrap" }}>

}

function JigzoSenderFlow() {
  const [step, setStep] = useState("upload");
  const [imgSrc, setImgSrc] = useState(null);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [zoom, setZoom] = useState(1);
  const [cropData, setCropData] = useState(null);
  const [pieceCount, setPieceCount] = useState(18);
  const [senderName, setSenderName] = useState("");
  const [senderCountry, setSenderCountry] = useState(COUNTRIES[0]);
  const [senderPhone, setSenderPhone] = useState("");
  const [packId, setPackId] = useState("single");
  const [recipients, setRecipients] = useState([{ name: "", phone: "", country: COUNTRIES[0] }]);
  const [revealIdentity, setRevealIdentity] = useState(true);
  const [occasion, setOccasion] = useState("");
  const [tone, setTone] = useState("");
  const [message, setMessage] = useState("");
  const [revealStage, setRevealStage] = useState(false);
  const [selectedUpgrades, setSelectedUpgrades] = useState([]);
  const [termsAgreed, setTermsAgreed] = useState(false);

  const dragRef = useRef(null);
  const pointersRef = useRef(new Map());
  const pinchRef = useRef(null);
  const fileInputRef = useRef(null);
  const cropFrameRef = useRef(null);
  const imgElRef = useRef(null);

  useEffect(() => { window.scrollTo(0, 0); }, [step]);

  const currentPack = useMemo(() => PACK_OPTIONS.find(p => p.id === packId) || PACK_OPTIONS[0], [packId]);
  const BASE_PRICE = currentPack.price;

  useEffect(() => {
    if (recipients.length > currentPack.limit) {
      setRecipients(recipients.slice(0, currentPack.limit));
    }
  }, [packId, currentPack]);

  const dims = useMemo(() => PIECE_OPTIONS.find((p) => p.count === pieceCount) || { cols: 3, rows: 6 }, [pieceCount]);
  const cols = dims.cols, rows = dims.rows;
  const edgeMap = useMemo(() => buildEdgeMap(cols, rows, 1337), [cols, rows]);
  const BOARD_W = 360;
  const BOARD_H = 640;
  const pieceW = BOARD_W / cols;
  const pieceH = BOARD_H / rows;
  const MX = pieceH * 0.5;
  const MY = pieceW * 0.5;
  const viewBox = `${-MX} ${-MY} ${BOARD_W + 2 * MX} ${BOARD_H + 2 * MY}`;

  const scramble = useMemo(() => {
    const rand = mulberry32(97 + (cols * 31 + rows) * 131);
    const slots = [];
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) slots.push({ r, c });
    for (let i = slots.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      const t = slots[i]; slots[i] = slots[j]; slots[j] = t;
    }
    const jx = pieceW * 0.14, jy = pieceH * 0.14;
    return slots.map((home, idx) => ({
      r: home.r, c: home.c,
      x: (idx % cols) * pieceW + (rand() - 0.5) * 2 * jx,
      y: Math.floor(idx / cols) * pieceH + (rand() - 0.5) * 2 * jy,
      rot: (rand() - 0.5) * 2 * 14,
    }));
  }, [cols, rows, pieceW, pieceH]);

  const handleFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (e) => { setImgSrc(e.target.result); setZoom(1); setPan({ x: 0, y: 0 }); setStep("crop"); };
    reader.readAsDataURL(file);
  };
  const clampPan = (px, py, z) => {
    const frame = cropFrameRef.current, imgEl = imgElRef.current;
    if (!frame || !imgEl || !imgEl.naturalWidth) return { x: px, y: py };
    const Wf = frame.clientWidth, Hf = frame.clientHeight;
    const cs = Math.min(Wf / imgEl.naturalWidth, Hf / imgEl.naturalHeight);
    const dW = imgEl.naturalWidth * cs * z, dH = imgEl.naturalHeight * cs * z;
    const ox = Math.max(0, (dW - Wf) / 2), oy = Math.max(0, (dH - Hf) / 2);
    return { x: Math.max(-ox, Math.min(ox, px)), y: Math.max(-oy, Math.min(oy, py)) };
  };
  const onPointerDown = (e) => {
    const f = cropFrameRef.current;
    if (f && e.pointerType === "touch" && f.setPointerCapture) { try { f.setPointerCapture(e.pointerId); } catch (_) {} }
    pointersRef.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    const size = pointersRef.current.size;
    if (size === 2) {
      const pts = [...pointersRef.current.values()];
      const a = pts[0], b = pts[1];
      const r = f.getBoundingClientRect();
      pinchRef.current = {
        startDist: Math.hypot(a.x - b.x, a.y - b.y) || 1,
        startZoom: zoom,
        startPan: { ...pan },
        startMid: { x: (a.x + b.x) / 2 - r.left, y: (a.y + b.y) / 2 - r.top },
        C: { x: r.width / 2, y: r.height / 2 },
      };
      dragRef.current = null;
    } else if (size === 1) {
      dragRef.current = { startX: e.clientX, startY: e.clientY, origPan: { ...pan } };
    }
  };
  const onPointerMove = (e) => {
    if (!pointersRef.current.has(e.pointerId)) return;
    pointersRef.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointersRef.current.size >= 2 && pinchRef.current) {
      const pts = [...pointersRef.current.values()];
      const a = pts[0], b = pts[1];
      const f = cropFrameRef.current, r = f.getBoundingClientRect();
      const dist = Math.hypot(a.x - b.x, a.y - b.y) || 1;
      const curMid = { x: (a.x + b.x) / 2 - r.left, y: (a.y + b.y) / 2 - r.top };
      const g = pinchRef.current;
      const z1 = Math.max(1, Math.min(3, g.startZoom * (dist / g.startDist)));
      const ratio = z1 / g.startZoom;
      const px = (curMid.x - g.C.x) - ratio * (g.startMid.x - g.C.x - g.startPan.x);
      const py = (curMid.y - g.C.y) - ratio * (g.startMid.y - g.C.y - g.startPan.y);
      setZoom(z1);
      setPan(clampPan(px, py, z1));
      return;
    }
    if (!dragRef.current) return;
    const dx = e.clientX - dragRef.current.startX;
    const dy = e.clientY - dragRef.current.startY;
    setPan(clampPan(dragRef.current.origPan.x + dx, dragRef.current.origPan.y + dy, zoom));
  };
  const onPointerUp = (e) => {
    const f = cropFrameRef.current;
    if (e && e.pointerId != null) {
      if (f && f.releasePointerCapture) { try { f.releasePointerCapture(e.pointerId); } catch (_) {} }
      pointersRef.current.delete(e.pointerId);
    } else { pointersRef.current.clear(); }
    if (pointersRef.current.size < 2) pinchRef.current = null;
    if (pointersRef.current.size === 1) {
      const only = [...pointersRef.current.values()][0];
      dragRef.current = { startX: only.x, startY: only.y, origPan: { ...pan } };
    } else if (pointersRef.current.size === 0) {
      dragRef.current = null;
    }
  };
  const captureCrop = useCallback(() => {
    const imgEl = imgElRef.current;
    const frame = cropFrameRef.current;
    if (!imgEl || !frame || !imgEl.naturalWidth) return;
    const rect = frame.getBoundingClientRect();
    const Wf = rect.width, Hf = rect.height;
    const Wi = imgEl.naturalWidth, Hi = imgEl.naturalHeight;
    const OUT_W = 540, OUT_H = 960;
    const k = OUT_W / Wf;
    const containScale = Math.min(Wf / Wi, Hf / Hi);
    const containDw = Wi * containScale, containDh = Hi * containScale;
    const cx = Wf / 2, cy = Hf / 2;
    const p0x = (Wf - containDw) / 2, p0y = (Hf - containDh) / 2;
    const pf0x = cx + (p0x - cx) * zoom + pan.x;
    const pf0y = cy + (p0y - cy) * zoom + pan.y;
    const sEff = k * containScale * zoom;
    const canvas = document.createElement("canvas");
    canvas.width = OUT_W; canvas.height = OUT_H;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#1C1913";
    ctx.fillRect(0, 0, OUT_W, OUT_H);
    try {
      ctx.save();
      ctx.filter = "blur(26px) brightness(0.5)";
      const cover = Math.max(OUT_W / Wi, OUT_H / Hi);
      const cw = Wi * cover, ch = Hi * cover;
      ctx.drawImage(imgEl, (OUT_W - cw) / 2, (OUT_H - ch) / 2, cw, ch);
      ctx.restore();
    } catch (e) {}
    ctx.drawImage(imgEl, k * pf0x, k * pf0y, sEff * Wi, sEff * Hi);
    setCropData(canvas.toDataURL("image/jpeg", 0.92));
    setStep("pieces");
  }, [zoom, pan]);

  const occasionObj = OCCASIONS.find((o) => o.id === occasion);
  const toneObj = TONES.find((t) => t.id === tone);

  const getUpgradePrice = (uId) => {
    if (uId === "insights") {
      return currentPack.insightsPrice;
    }
    return 1;
  };

  const toggleUpgrade = (id) => setSelectedUpgrades((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : prev.concat(id));
  const upgradesTotal = selectedUpgrades.reduce((sum, id) => sum + getUpgradePrice(id), 0);
  const grandTotal = BASE_PRICE + upgradesTotal;

  const senderValid = phoneValid(senderCountry.dial + senderPhone);

  const recipientNumbers = useMemo(() => {
    return recipients.map(r => r.country.dial + r.phone);
  }, [recipients]);

  const duplicateNumbers = useMemo(() => {
    return recipientNumbers.filter((item, index) => recipientNumbers.indexOf(item) !== index && item.length > 5);
  }, [recipientNumbers]);

  const isDuplicate = (phone) => duplicateNumbers.includes(phone);

  const recipientsValid = useMemo(() => {
    if (recipients.length === 0) return false;
    const phoneSet = new Set();
    for (const r of recipients) {
      if (!r.name.trim()) return false;
      const fullPhone = r.country.dial + r.phone;
      if (!phoneValid(fullPhone)) return false;
      if (phoneSet.has(fullPhone)) return false;
      phoneSet.add(fullPhone);
    }
    return true;
  }, [recipients]);

  const contactsReady = senderName && senderValid && recipientsValid;

  const pickCombo = (occ, tn) => {
    const nextSug = suggestedMessage(occ, tn);
    const prevSug = suggestedMessage(occasion, tone);
    if (!message.trim() || message === prevSug) setMessage(nextSug);
  };

  const savePayload = () => {
    const payload = {
      cropData, message, fromName: senderName, toName: recipients.map(r => r.name).join(", "),
      occasion, occasionLabel: occasionObj ? occasionObj.label : "",
      tone, pieceCount, revealIdentity, recipients,
    };
    try { localStorage.setItem("jigzo:test-puzzle", JSON.stringify(payload)); } catch (e) {}
  };

  useEffect(() => {
    if (step !== "processing") return;
    savePayload();
    const t = setTimeout(() => setStep("success"), 2600);
    return () => clearTimeout(t);
  }, [step]);

  const railIdx = { upload: 0, crop: 0, pieces: 1, contacts: 2, message: 3, preview: 4, enhance: 5, checkout: 6 }[step];

  return (
    <div style={{ fontFamily: "Archia, sans-serif", color: T.ink, padding: "34px 20px 70px" }}>
      <style>{`
        ::placeholder { color: ${T.ink40}; }
        textarea, input, select { font-family: 'Archia', sans-serif; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @keyframes ckPop { 0%{ transform:scale(0); } 70%{ transform:scale(1.12); } 100%{ transform:scale(1); } }
        @keyframes ckDraw { to { stroke-dashoffset:0; } }
      `}</style>

      <div style={{ maxWidth: 480, margin: "0 auto" }}>
        {railIdx != null && <StepRail idx={railIdx} />}

        {/* ============ STEP 1 — PHOTO (upload) ============ */}
        {step === "upload" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 27, fontWeight: 300, margin: "0 0 12px", letterSpacing: "-0.02em", lineHeight: 1.1 }}>
              Choose the photo they'll uncover.
            </h1>
            <p style={{ fontSize: 15, color: T.ink66, margin: "0 0 26px", lineHeight: 1.55 }}>
              Upload a photo. Hide your words. We'll deliver a puzzle they'll have to solve before they can read them.
            </p>
            <div
              onClick={() => fileInputRef.current && fileInputRef.current.click()}
              onDrop={(e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
              onDragOver={(e) => e.preventDefault()}
              style={{ border: "1.5px dashed " + T.ink15, borderRadius: 18, padding: "48px 20px",
                textAlign: "center", cursor: "pointer", background: T.card }}>
              <div style={{ width: 54, height: 54, margin: "0 auto 14px", filter: "drop-shadow(0 6px 14px rgba(124,76,34,0.35))" }}><PuzzleBadge size={54} /></div>
              <div style={{ fontWeight: 600, fontSize: 15.5, marginBottom: 4 }}>Upload a photo</div>
              <div style={{ fontSize: 12.5, color: T.ink50 }}>JPG or PNG</div>
            </div>
            <input ref={fileInputRef} type="file" accept="image/*" style={{ display: "none" }}
              onChange={(e) => handleFile(e.target.files[0])} />
          </div>
        )}

        {/* ============ STEP 1 — PHOTO (crop) ============ */}
        {step === "crop" && imgSrc && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 22, fontWeight: 500, margin: "0 0 6px", letterSpacing: "-0.01em" }}>Frame the moment</h1>
            <p style={{ fontSize: 13.5, color: T.ink60, margin: "0 0 20px" }}>
              Zoom, drag to reposition. This portrait frame is exactly what gets sent.
            </p>
            <div style={{ display: "flex", justifyContent: "center" }}>
              <div ref={cropFrameRef}
                style={{ position: "relative", width: "100%", maxWidth: 300, aspectRatio: "9 / 16", borderRadius: 20,
                  overflow: "hidden", background: T.ink, cursor: "grab", touchAction: "none", margin: "0 auto",
                  boxShadow: "0 0 0 2px " + T.bg + ", 0 0 0 3px " + T.ink08 }}
                onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp} onPointerLeave={onPointerUp}>
                <img src={imgSrc} alt="" aria-hidden="true" draggable={false}
                  style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover",
                    filter: "blur(18px) brightness(0.5)", transform: "scale(1.15)", userSelect: "none", pointerEvents: "none" }} />
                <img ref={imgElRef} src={imgSrc} alt="" draggable={false}
                  style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", objectFit: "contain",
                    transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: "center",
                    userSelect: "none", pointerEvents: "none" }} />
                {[{ top: 10, left: 10 }, { top: 10, right: 10 }, { bottom: 10, left: 10 }, { bottom: 10, right: 10 }].map((pos, i) => (
                  <div key={i} style={{ position: "absolute", width: 16, height: 16, border: "2px solid " + T.goldBright, pointerEvents: "none",
                    ...(pos.top !== undefined ? { top: pos.top, borderBottom: "none" } : { bottom: pos.bottom, borderTop: "none" }),
                    ...(pos.left !== undefined ? { left: pos.left, borderRight: "none" } : { right: pos.right, borderLeft: "none" }) }} />
                ))}
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "18px 0 6px" }}>
              <span style={{ fontSize: 18 }}>−</span>
              <input type="range" min="1" max="3" step="0.01" value={zoom}
                onChange={(e) => { const z = parseFloat(e.target.value); setZoom(z); setPan((p) => clampPan(p.x, p.y, z)); }}
                style={{ flex: 1, accentColor: T.gold }} />
              <span style={{ fontSize: 18 }}>+</span>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
              <GhostButton onClick={() => setStep("upload")}>Back</GhostButton>
              <PrimaryButton onClick={captureCrop} style={{ flex: 1 }}>Continue</PrimaryButton>
            </div>
          </div>
        )}

        {/* ============ STEP 2 — DIFFICULTY ============ */}
        {step === "pieces" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 24, fontWeight: 300, margin: "0 0 6px", letterSpacing: "-0.02em" }}>Choose the challenge.</h1>
            <p style={{ fontSize: 14, color: T.ink66, margin: "0 0 20px" }}>More pieces mean more anticipation before the final reveal.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {PIECE_OPTIONS.map((opt) => {
                const sel = pieceCount === opt.count;
                return (
                  <button key={opt.count} onClick={() => setPieceCount(opt.count)}
                    style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, padding: "16px 18px",
                      borderRadius: 14, border: sel ? "1.5px solid " + T.ink : "1.5px solid " + T.ink15,
                      background: sel ? "rgba(28,25,19,0.04)" : T.card, cursor: "pointer", textAlign: "left" }}>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                        <span style={{ fontWeight: 600, fontSize: 16 }}>{opt.label}</span>
                        <span style={{ fontSize: 12, color: T.ink50 }}>· {opt.pieces}</span>
                        {opt.recommended && (
                          <span style={{ fontFamily: T.mono, fontWeight: 500, fontSize: 9.5, letterSpacing: "0.08em", textTransform: "uppercase",
                            color: T.ink, background: T.goldWarm, borderRadius: 100, padding: "3px 8px" }}>★ Recommended</span>
                        )}
                      </div>
                      <div style={{ fontSize: 12.5, color: T.ink60, lineHeight: 1.4 }}>{opt.copy}</div>
                    </div>
                    <div style={{ width: 18, height: 18, borderRadius: "50%", border: "1.5px solid " + T.ink, flex: "none",
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {sel && <div style={{ width: 9, height: 9, borderRadius: "50%", background: T.ink }} />}
                    </div>
                  </button>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
              <GhostButton onClick={() => setStep("crop")}>Back</GhostButton>
              <PrimaryButton onClick={() => setStep("contacts")} style={{ flex: 1 }}>Continue</PrimaryButton>
            </div>
          </div>
        )}

        {/* ============ STEP 3 — SENDER & RECEIVER ============ */}
        {step === "contacts" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 24, fontWeight: 300, margin: "0 0 16px", letterSpacing: "-0.02em", display: "flex", alignItems: "baseline", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
              <span>Who is this for?</span>
              <span style={{ fontSize: 12, color: T.ink50, fontWeight: 400, letterSpacing: "normal" }}>Their first message</span>
            </h1>

            {/* Preview placed at the top */}
            <div style={{ marginBottom: 20 }}>
              <WhatsAppPreview senderName={senderName} showIdentity={revealIdentity} receiverName={recipients[0]?.name} />
            </div>

            <ContactBlock title="From (you)" name={senderName} setName={setSenderName}
              country={senderCountry} setCountry={setSenderCountry} phone={senderPhone} setPhone={setSenderPhone}
              showNameCheckbox={true} revealIdentity={revealIdentity} setRevealIdentity={setRevealIdentity} />

            {/* Recipient Package Dropdown */}
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 6, color: T.ink74 }}>Surprise Package</label>
              <select value={packId} onChange={(e) => setPackId(e.target.value)} style={inputStyle}>
                {PACK_OPTIONS.map((p) => <option key={p.id} value={p.id}>{p.label} - {formatPrice(p.price)}</option>)}
              </select>
            </div>

            {/* To Box / List of Recipients */}
            <div>
              {recipients.map((rec, i) => (
                <RecipientContactBlock
                  key={i}
                  idx={i}
                  recipient={rec}
                  isDuplicate={isDuplicate(rec.country.dial + rec.phone)}
                  onChange={(updated) => {
                    const next = [...recipients];
                    next[i] = updated;
                    setRecipients(next);
                  }}
                  onRemove={recipients.length > 1 ? () => {
                    setRecipients(recipients.filter((_, idx) => idx !== i));
                  } : null}
                />
              ))}

              {recipients.length < currentPack.limit && (
                <button
                  type="button"
                  onClick={() => setRecipients([...recipients, { name: "", phone: "", country: COUNTRIES[0] }])}
                  style={{ width: "100%", padding: "12px", border: "1.5px dashed " + T.ink15, borderRadius: 12, background: "none", cursor: "pointer", color: T.goldDeep, fontWeight: 600, fontSize: 14, marginBottom: 18, fontFamily: "Archia" }}
                >
                  + Add Recipient (Up to {currentPack.limit})
                </button>
              )}
            </div>

            <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
              <GhostButton onClick={() => setStep("pieces")}>Back</GhostButton>
              <PrimaryButton onClick={() => setStep("message")} disabled={!contactsReady} style={{ flex: 1 }}>Continue</PrimaryButton>
            </div>
          </div>
        )}

        {/* ============ STEP 4 — OCCASION & MESSAGE ============ */}
        {step === "message" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 24, fontWeight: 300, margin: "0 0 6px", letterSpacing: "-0.02em" }}>Say it right.</h1>
            <p style={{ fontSize: 14, color: T.ink66, margin: "0 0 18px" }}>Pick an occasion and a tone, we'll suggest a message you can make your own.</p>

            <div style={{ position: "relative", borderRadius: 20, overflow: "hidden", border: "1px solid " + T.ink15, padding: "24px 20px" }}>
              <div style={{ position: "absolute", inset: 0, zIndex: 1 }}>
                <RevealFace photo={cropData} toName={recipients[0]?.name} fromName={senderName} message={message} />
              </div>
              <div style={{ position: "absolute", inset: 0, zIndex: 2, background: "rgba(28,25,19,0.72)", backdropFilter: "blur(8px)" }} />

              <div style={{ position: "relative", zIndex: 3, color: "#F4EDDF" }}>
                <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 6, color: "rgba(244,237,223,0.85)" }}>Occasion</label>
                    <select value={occasion} onChange={(e) => { setOccasion(e.target.value); pickCombo(e.target.value, tone); }}
                      style={{ ...inputStyle, background: "rgba(251,247,238,0.12)", border: "1.5px solid rgba(244,237,223,0.3)", color: "#FFF" }}>
                      <option value="" style={{ color: T.ink }}>Choose…</option>
                      {OCCASIONS.map((o) => <option key={o.id} value={o.id} style={{ color: T.ink }}>{o.label}</option>)}
                    </select>
                  </div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 6, color: "rgba(244,237,223,0.85)" }}>Tone</label>
                    <select value={tone} onChange={(e) => { setTone(e.target.value); pickCombo(occasion, e.target.value); }}
                      style={{ ...inputStyle, background: "rgba(251,247,238,0.12)", border: "1.5px solid rgba(244,237,223,0.3)", color: "#FFF" }}>
                      <option value="" style={{ color: T.ink }}>Choose…</option>
                      {TONES.map((t) => <option key={t.id} value={t.id} style={{ color: T.ink }}>{t.label}</option>)}
                    </select>
                  </div>
                </div>

                <label style={{ fontSize: 12.5, fontWeight: 600, display: "block", marginBottom: 6, color: "rgba(244,237,223,0.85)" }}>
                  Message {occasion && tone && <span style={{ fontWeight: 400, color: "rgba(244,237,223,0.6)" }}>· suggested, edit freely</span>}
                </label>
                <textarea value={message} onChange={(e) => setMessage(e.target.value.slice(0, 200))} rows={4}
                  placeholder={occasion && tone ? suggestedMessage(occasion, tone) : "Pick an occasion and tone above, or just start typing…"}
                  style={{ ...inputStyle, resize: "none", lineHeight: 1.5, padding: 14, background: "rgba(251,247,238,0.12)", border: "1.5px solid rgba(244,237,223,0.3)", color: "#FFF" }} />
                
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                  {occasion && tone ? (
                    <button onClick={() => setMessage(suggestedMessage(occasion, tone))}
                      style={{ background: "none", border: "none", padding: 0, fontSize: 11.5, color: T.goldWarm, fontWeight: 600, cursor: "pointer" }}>
                      Reset to suggested
                    </button>
                  ) : <span />}
                  <div style={{ fontSize: 11.5, color: "rgba(244,237,223,0.6)" }}>{message.length}/200</div>
                </div>
              </div>
            </div>

            <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
              <GhostButton onClick={() => setStep("contacts")}>Back</GhostButton>
              <PrimaryButton onClick={() => setStep("preview")} disabled={!occasion || !tone || !message.trim()} style={{ flex: 1 }}>Continue</PrimaryButton>
            </div>
          </div>
        )}

        {/* ============ STEP 5 — PREVIEW ============ */}
        {step === "preview" && cropData && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 24, fontWeight: 300, margin: "0 0 16px", letterSpacing: "-0.02em" }}>Exactly what they'll see.</h1>

            <div style={{ width: "100%", maxWidth: 296, margin: "0 auto", position: "relative",
              background: "#050505", borderRadius: 54, padding: 11,
              boxShadow: "0 44px 90px -26px rgba(28,25,19,0.5), 0 10px 26px rgba(28,25,19,0.14)" }}>
              <div onClick={() => setRevealStage((s) => !s)}
                style={{ borderRadius: 44, overflow: "hidden", background: T.bg, position: "relative", aspectRatio: "9 / 16", cursor: "pointer" }}>
                {!revealStage ? (
                  <div style={{ position: "relative", width: "100%", height: "100%" }}>
                    <svg viewBox={viewBox} style={{ width: "100%", height: "100%", display: "block" }}>
                      <defs>
                        <filter id="pieceShadow" x="-25%" y="-25%" width="150%" height="150%">
                          <feDropShadow dx="0" dy="2" stdDeviation="3" floodColor="#000000" floodOpacity="0.4" />
                        </filter>
                        {scramble.map((p, i) => (
                          <clipPath id={`lockPc-${i}`} key={i}><path d={piecePath(p.r, p.c, cols, rows, pieceW, pieceH, edgeMap)} /></clipPath>
                        ))}
                      </defs>
                      {scramble.map((p, i) => (
                        <g key={i} transform={`translate(${p.x} ${p.y}) rotate(${p.rot} ${pieceW / 2} ${pieceH / 2})`} filter="url(#pieceShadow)">
                          <g clipPath={`url(#lockPc-${i})`}>
                            <image href={cropData} x={-p.c * pieceW} y={-p.r * pieceH} width={BOARD_W} height={BOARD_H} preserveAspectRatio="xMidYMid slice" />
                          </g>
                          <path d={piecePath(p.r, p.c, cols, rows, pieceW, pieceH, edgeMap)} fill="none" stroke="#050505" strokeOpacity="0.35" strokeWidth="1.1" />
                        </g>
                      ))}
                    </svg>
                    <div style={{
                      position: "absolute",
                      top: "60px",
                      left: "15px",
                      right: "15px",
                      textAlign: "center",
                      fontFamily: "'Caveat', cursive",
                      fontSize: "30px",
                      fontWeight: "700",
                      color: T.goldBright,
                      textShadow: "0 2px 8px rgba(0,0,0,0.85), 0 1px 3px rgba(0,0,0,0.9)",
                      transform: "rotate(-3deg)",
                      pointerEvents: "none",
                      lineHeight: "1.2"
                    }}>
                      Tap the puzzle to watch it solve and reveal.
                    </div>
                  </div>
                ) : (
                  <div style={{ position: "absolute", inset: 0, animation: "fadeUp 0.5s ease" }}>
                    <RevealFace photo={cropData} toName={recipients[0]?.name} fromName={senderName} message={message} />
                  </div>
                )}
                <div style={{ position: "absolute", top: 13, left: "50%", transform: "translateX(-50%)", width: 92, height: 27,
                  background: "#050505", borderRadius: 100, zIndex: 40, pointerEvents: "none" }} />
              </div>
            </div>

            <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
              <GhostButton onClick={() => setStep("message")}>Back</GhostButton>
              <PrimaryButton onClick={() => setStep("enhance")} style={{ flex: 1 }}>Continue</PrimaryButton>
            </div>
          </div>
        )}

        {/* ============ STEP 6 — ALMOST THERE ============ */}
        {step === "enhance" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 24, fontWeight: 300, margin: "0 0 6px", letterSpacing: "-0.02em" }}>Make the Moment Even More Special</h1>
            <p style={{ fontSize: 14, color: T.ink66, margin: "0 0 20px", lineHeight: 1.55 }}>Add optional extras to make your surprise even more memorable.</p>

            {UPGRADES.map((u) => {
              const selected = selectedUpgrades.includes(u.id);
              const priceVal = getUpgradePrice(u.id);
              return (
                <div key={u.id} onClick={() => toggleUpgrade(u.id)} role="button" aria-pressed={selected}
                  style={{ border: selected ? "2px solid " + T.ink : "1.5px solid " + T.ink15,
                    background: selected ? "rgba(28,25,19,0.04)" : T.card, borderRadius: 16, padding: 18,
                    marginBottom: 14, cursor: "pointer", transition: "border-color 0.2s ease, background 0.2s ease" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 9 }}>
                    <div style={{ fontWeight: 600, fontSize: 16, flex: 1 }}>{u.name}</div>
                    <div style={{ fontFamily: T.mono, fontSize: 13, fontWeight: 600, color: T.ink }}>Add for just {formatPrice(priceVal)}</div>
                    <div style={{ width: 24, height: 24, borderRadius: "50%", flex: "none",
                      border: selected ? "1.5px solid " + T.ink : "1.5px solid rgba(28,25,19,0.3)",
                      background: selected ? T.ink : "transparent",
                      display: "flex", alignItems: "center", justifyContent: "center", transition: "background 0.2s ease" }}>
                      {selected && (
                        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                          <path d="M3 7 L5.5 9.5 L10 4" stroke={T.bg} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                      )}
                    </div>
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 600, color: T.ink, marginBottom: 6, lineHeight: 1.4 }}>{u.tagline}</div>
                  <div style={{ fontSize: 13.5, color: T.ink66, lineHeight: 1.55, marginBottom: 14 }}>{u.description.replace(/\{recipient\}/g, recipients[0]?.name || "they")}</div>
                  <div style={{ fontFamily: T.mono, fontSize: 10, fontWeight: 500, letterSpacing: "0.14em", textTransform: "uppercase", color: T.ink40, marginBottom: 8 }}>Here's what you'll receive</div>
                  <div onClick={(e) => e.stopPropagation()} style={{ cursor: "default" }}>
                    <WhatsAppPreview receiverName={senderName} message={interpolateInsightsPreview(u.preview, senderName, recipients[0]?.name)} />
                  </div>
                </div>
              );
            })}

            <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
              <GhostButton onClick={() => setStep("preview")}>Back</GhostButton>
              <PrimaryButton onClick={() => setStep("checkout")} style={{ flex: 1 }}>Continue</PrimaryButton>
            </div>
            <div style={{ textAlign: "center", marginTop: 14 }}>
              <button onClick={() => { setSelectedUpgrades([]); setStep("checkout"); }}
                style={{ background: "none", border: "none", padding: 6, fontSize: 13, color: T.ink50, cursor: "pointer", fontFamily: "Archia, sans-serif" }}>
                Continue without extras
              </button>
            </div>
          </div>
        )}

        {/* ============ STEP 7 — SECURE CHECKOUT ============ */}
        {step === "checkout" && (
          <div style={{ animation: "fadeUp 0.4s ease" }}>
            <h1 style={{ fontSize: 28, fontWeight: 300, margin: "0 0 18px", letterSpacing: "-0.02em", textAlign: "center" }}>Everything is ready.</h1>
            <div style={{ padding: 18, borderRadius: 16, background: T.card, border: "1px solid " + T.ink08, marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 14 }}>
                {cropData && <img src={cropData} alt="" style={{ width: 52, height: 92, objectFit: "cover", borderRadius: 8, flex: "none" }} />}
                <div style={{ fontSize: 13.5, lineHeight: 1.7 }}>
                  <div><strong>Occasion</strong> · {occasionObj ? occasionObj.label : "—"}{toneObj ? " · " + toneObj.label : ""}</div>
                  <div><strong>To</strong> · {recipients.map(r => r.name || "—").join(", ")}</div>
                  <div><strong>Difficulty</strong> · {dims.label} ({pieceCount} pieces)</div>
                  <div><strong>Sender shown</strong> · {revealIdentity ? "Yes" : "Anonymous"}</div>
                </div>
              </div>
              <div style={{ borderTop: "1px solid " + T.ink08, paddingTop: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, color: T.ink66, marginBottom: 7 }}>
                  <span>Digital Puzzle ({currentPack.label.split(":")[0]})</span><span style={{ fontFamily: T.mono }}>{formatPrice(BASE_PRICE)}</span>
                </div>
                {selectedUpgrades.map((id) => {
                  const u = UPGRADES.find((x) => x.id === id);
                  return u ? (
                    <div key={id} style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, color: T.ink66, marginBottom: 7 }}>
                      <span>{u.name}</span><span style={{ fontFamily: T.mono }}>+{formatPrice(getUpgradePrice(id))}</span>
                    </div>
                  ) : null;
                })}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderTop: "1px solid " + T.ink08, paddingTop: 10, marginTop: 3 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: T.ink }}>Total</span>
                  <span style={{ fontFamily: T.mono, fontSize: 16, fontWeight: 600, color: T.ink }}>{formatPrice(grandTotal)}</span>
                </div>
              </div>
            </div>

            <label style={{ display: "flex", gap: 10, alignItems: "flex-start", cursor: "pointer", fontSize: 13.5, color: T.ink74, margin: "18px 0 20px", lineHeight: 1.5, textAlign: "left" }}>
              <input type="checkbox" checked={termsAgreed} onChange={(e) => setTermsAgreed(e.target.checked)} style={{ marginTop: 4, flex: "none" }} />
              <span>
                I confirm that I own or have permission to use the uploaded photos and content, and I have read and agree to the <a href="terms.html" target="_blank" style={{ color: T.goldDeep, textDecoration: "underline", fontWeight: 600 }}>Terms &amp; Conditions and Privacy Policy</a>.
              </span>
            </label>

            <PrimaryButton onClick={() => setStep("processing")} disabled={!termsAgreed} style={{ width: "100%" }}>Pay &amp; Send</PrimaryButton>
            <div style={{ marginTop: 12, textAlign: "center" }}><GhostButton onClick={() => setStep("enhance")}>Back</GhostButton></div>
          </div>
        )}

        {/* ============ STEP 8 — PROCESSING ============ */}
        {step === "processing" && (
          <div style={{ animation: "fadeUp 0.4s ease", textAlign: "center", paddingTop: 30 }}>
            <div className="jz-orbit" role="status" aria-label="Preparing" style={{ marginBottom: 28 }}>
              <div className="jz-orbit__ring">
                <div className="jz-orbit__arm"><div className="jz-orbit__badge"><PuzzleBadge size={46} /></div></div>
                <div className="jz-orbit__arm"><div className="jz-orbit__badge"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#FAF8EC"/><circle cx="50" cy="50" r="48.3" fill="none" stroke="rgba(5,5,5,0.07)" strokeWidth="1"/><g fill="#050505"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
                <div className="jz-orbit__arm"><div className="jz-orbit__badge"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="49" fill="#111110"/><circle cx="50" cy="50" r="48.3" fill="none" stroke="rgba(208,160,54,0.5)" strokeWidth="1"/><g fill="#FAF8EC"><rect x="33" y="33" width="34" height="34" rx="8"/><circle cx="50" cy="29" r="8.6"/><circle cx="50" cy="71" r="8.6"/><circle cx="29" cy="50" r="8.6"/><circle cx="71" cy="50" r="8.6"/></g></svg></div></div>
              </div>
            </div>
            <h1 style={{ fontSize: 22, fontWeight: 500, margin: "0 0 8px", letterSpacing: "-0.01em" }}>Your reveal is being prepared…</h1>
            <p style={{ fontSize: 14, color: T.ink60 }}>This usually takes only a few seconds.</p>
          </div>
        )}

        {/* ============ STEP 9 — SUCCESS ============ */}
        {step === "success" && (
          <div style={{ animation: "fadeUp 0.4s ease", textAlign: "center", paddingTop: 30 }}>
            <div style={{ width: 84, height: 84, margin: "0 auto 24px", borderRadius: "50%", background: T.ink,
              display: "flex", alignItems: "center", justifyContent: "center", animation: "ckPop 0.5s cubic-bezier(.2,.8,.2,1) both" }}>
              <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
                <path d="M11 22 L18 29 L31 14" stroke={T.goldWarm} strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"
                  strokeDasharray="40" strokeDashoffset="40" style={{ animation: "ckDraw 0.5s ease 0.35s forwards" }} />
              </svg>
            </div>
            <h1 style={{ fontSize: 27, fontWeight: 300, margin: "0 0 12px", letterSpacing: "-0.02em" }}>Your JIGZO has been delivered.</h1>
            <p style={{ fontSize: 14.5, color: T.ink66, margin: "0 auto 26px", maxWidth: 360, lineHeight: 1.6 }}>
              {recipients.map(r => r.name || "They").join(", ")} will get a WhatsApp from JIGZO with a puzzle to solve, your words are waiting to be discovered... One piece at a time.
            </p>
            <PrimaryButton onClick={() => window.open("receive.html", "_blank")} style={{ width: "100%" }}>Open the reveal (local test)</PrimaryButton>
            <p style={{ fontSize: 11.5, color: T.ink50, marginTop: 12, lineHeight: 1.5 }}>
              Local test — opens the receiver experience (solve → reveal) in a new tab. No real WhatsApp send or payment yet.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<JigzoSenderFlow />);
  </script>
  <script>
    (function () {
      var root = document.getElementById("root");
      function fail(msg){ root.innerHTML='<div style="font-family:sans-serif;color:#7a1c1c;max-width:520px;margin:80px auto;padding:0 24px;text-align:center;line-height:1.5"><strong>Couldn’t load the puzzle maker.</strong><br>'+msg+'</div>'; }
      if (typeof Babel==="undefined"||typeof React==="undefined"||typeof ReactDOM==="undefined"){ fail("A required library failed to load (CDN/connection)."); return; }
      try {
        var src = document.getElementById("jigzo-src").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        var s = document.createElement("script"); s.textContent = out; document.body.appendChild(s);
      } catch (err) { console.error(err); fail((err&&err.message)?err.message:String(err)); }
    })();
  </script>
</body>
</html>
