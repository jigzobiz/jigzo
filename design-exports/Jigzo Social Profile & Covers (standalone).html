document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"7f8e90cf-2464-448c-91fb-71a3fffb23de\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n@font-face { font-family:\"Archia\"; src:url(\"da3983f3-bc89-4f08-8294-1b6a5f1aeea7\") format(\"opentype\"); font-weight:100; font-style:normal; font-display:swap; }\n@font-face { font-family:\"Archia\"; src:url(\"e749bf74-fc26-438c-b99a-4e05ea6f75c5\") format(\"opentype\"); font-weight:300; font-style:normal; font-display:swap; }\n@font-face { font-family:\"Archia\"; src:url(\"4ae9e535-54a3-4d5d-8d61-e9b452613a53\") format(\"opentype\"); font-weight:400; font-style:normal; font-display:swap; }\n@font-face { font-family:\"Archia\"; src:url(\"4b34dbd9-bbcc-4f83-825e-936e0ef4bf54\") format(\"opentype\"); font-weight:500; font-style:normal; font-display:swap; }\n@font-face { font-family:\"Archia\"; src:url(\"f6cdc7c8-4472-4fa5-8655-d09dcbf3fd35\") format(\"opentype\"); font-weight:600; font-style:normal; font-display:swap; }\n@font-face { font-family:\"Archia\"; src:url(\"d54089ac-ab99-4994-86dc-0a8f907375a6\") format(\"opentype\"); font-weight:700; font-style:normal; font-display:swap; }\n* { box-sizing:border-box; }\nhtml,body { margin:0; padding:0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:#FAF8EC; color:#050505; font-family:'Archia',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh;\">\n  <div style=\"max-width:1180px; margin:0 auto; padding:96px 56px 140px;\">\n\n    <header style=\"margin-bottom:72px;\">\n      <span style=\"font-weight:600; font-size:13px; letter-spacing:0.24em; text-transform:uppercase; color:#A67C3D; display:block; margin-bottom:18px;\">Social Account Art<\u002Fspan>\n      <h1 style=\"font-weight:700; font-size:56px; line-height:1; letter-spacing:-0.02em; margin:0 0 18px;\">Profile &amp; cover photos<\u002Fh1>\n      <p style=\"font-weight:300; font-size:20px; line-height:1.45; color:rgba(5,5,5,0.62); max-width:720px; margin:0; text-wrap:pretty;\">One profile photo for every account, plus cover art for the platforms that have it. Each is shown at its true upload size with platform-safe zones marked. Toggle <span style=\"font-weight:500;\">guides<\u002Fspan> off before exporting.<\u002Fp>\n    <\u002Fheader>\n\n    <!-- ===== PROFILE PHOTO ===== -->\n    <section style=\"border-top:1px solid rgba(5,5,5,0.14); padding-top:48px; margin-bottom:88px;\">\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\">\n        <span style=\"font-weight:600; font-size:13px; letter-spacing:0.2em; text-transform:uppercase;\">Profile photo<\u002Fspan>\n        <span style=\"font-weight:300; font-size:15px; color:rgba(5,5,5,0.55);\">1080 × 1080 · TikTok · Instagram · Facebook · WhatsApp<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-weight:300; font-size:16px; line-height:1.6; color:rgba(5,5,5,0.7); margin:0 0 40px; max-width:560px;\">Every platform crops the square to a circle. The cream disc with the near-black piece holds contrast on any feed and stays legible down to 32px.<\u002Fp>\n\n      <div style=\"display:flex; gap:56px; align-items:flex-start; flex-wrap:wrap;\">\n        <!-- master square -->\n        <div style=\"flex:none; display:flex; flex-direction:column; align-items:center; gap:18px;\">\n          <div style=\"position:relative; width:300px; height:300px;\">\n            <div style=\"width:300px; height:300px; border-radius:24px; overflow:hidden; box-shadow:0 24px 50px -28px rgba(5,5,5,0.5);\">\n              <div style=\"width:1080px; height:1080px; transform:scale(0.2778); transform-origin:top left; background:#050505; display:flex; align-items:center; justify-content:center;\">\n                <img src=\"6d39efcb-0be2-4cc8-b55c-356f8df08cfc\" style=\"width:97%; height:auto; display:block;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ guides }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"position:absolute; inset:0; border-radius:50%; border:2px dashed rgba(166,124,61,0.7); pointer-events:none;\"><\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <span style=\"font-weight:400; font-size:13px; letter-spacing:0.06em; color:rgba(5,5,5,0.5);\">1080×1080 master · circle crop shown<\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- in-context chips -->\n        <div style=\"flex:1; min-width:300px;\">\n          <span style=\"font-weight:500; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(5,5,5,0.45); display:block; margin-bottom:28px;\">As it appears in-app<\u002Fspan>\n          <div style=\"display:flex; gap:40px; align-items:flex-end; flex-wrap:wrap;\">\n            <div style=\"display:flex; flex-direction:column; align-items:center; gap:12px;\">\n              <div style=\"width:110px; height:110px; border-radius:50%; overflow:hidden;\"><div style=\"width:1080px; height:1080px; transform:scale(0.1019); transform-origin:top left; background:#050505; display:flex; align-items:center; justify-content:center;\"><img src=\"6d39efcb-0be2-4cc8-b55c-356f8df08cfc\" style=\"width:97%; height:auto;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:12px; color:rgba(5,5,5,0.5);\">profile · 110<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; align-items:center; gap:12px;\">\n              <div style=\"width:56px; height:56px; border-radius:50%; overflow:hidden;\"><div style=\"width:1080px; height:1080px; transform:scale(0.0519); transform-origin:top left; background:#050505; display:flex; align-items:center; justify-content:center;\"><img src=\"6d39efcb-0be2-4cc8-b55c-356f8df08cfc\" style=\"width:97%; height:auto;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:12px; color:rgba(5,5,5,0.5);\">story ring · 56<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; align-items:center; gap:12px;\">\n              <div style=\"width:32px; height:32px; border-radius:50%; overflow:hidden;\"><div style=\"width:1080px; height:1080px; transform:scale(0.0296); transform-origin:top left; background:#050505; display:flex; align-items:center; justify-content:center;\"><img src=\"6d39efcb-0be2-4cc8-b55c-356f8df08cfc\" style=\"width:97%; height:auto;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:12px; color:rgba(5,5,5,0.5);\">comment · 32<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== FACEBOOK COVER ===== -->\n    <section style=\"border-top:1px solid rgba(5,5,5,0.14); padding-top:48px; margin-bottom:88px;\">\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\">\n        <span style=\"font-weight:600; font-size:13px; letter-spacing:0.2em; text-transform:uppercase;\">Facebook cover<\u002Fspan>\n        <span style=\"font-weight:300; font-size:15px; color:rgba(5,5,5,0.55);\">1640 × 624 upload · safe-zone 820×312 centred<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-weight:300; font-size:16px; line-height:1.6; color:rgba(5,5,5,0.7); margin:0 0 40px; max-width:620px;\">Facebook crops the sides on phones, so the whole lockup is centred and vertically balanced. It reads the same on desktop and mobile, and stays clear of the profile bubble that sits below.<\u002Fp>\n\n      <div class=\"jz-scale-frame\" data-nw=\"1640\" style=\"position:relative; width:984px; max-width:100%; aspect-ratio:1640/624; border-radius:14px; overflow:hidden; box-shadow:0 30px 60px -34px rgba(5,5,5,0.45);\">\n        <div class=\"jz-scale-inner\" style=\"width:1640px; height:624px; transform:scale(0.6); transform-origin:top left; background:#FAF8EC; position:relative; padding:70px 330px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;\">\n          <span style=\"font-weight:500; font-size:24px; letter-spacing:0.24em; text-transform:uppercase; color:#A67C3D;\">JIGZO.BIZ<\u002Fspan>\n          <img src=\"25b46605-43e4-4337-8345-861289a975a1\" alt=\"JIGZO\" style=\"height:124px; width:auto; display:block;\">\n          <p style=\"font-weight:300; font-size:36px; line-height:1.3; color:rgba(5,5,5,0.72); margin:0; text-align:center; max-width:980px; text-wrap:pretty;\">A puzzle that ends in a message. Make their moment, not just a gift.<\u002Fp>\n        <\u002Fdiv>\n        <sc-if value=\"{{ guides }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute; top:0; bottom:0; left:11%; right:11%; border-left:2px dashed rgba(166,124,61,0.6); border-right:2px dashed rgba(166,124,61,0.6); pointer-events:none;\"><\u002Fdiv>\n          <span style=\"position:absolute; left:50%; top:10px; transform:translateX(-50%); font-size:13px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:rgba(166,124,61,0.9); pointer-events:none;\">mobile-safe centre<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== WHATSAPP COVER ===== -->\n    <section style=\"border-top:1px solid rgba(5,5,5,0.14); padding-top:48px;\">\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\">\n        <span style=\"font-weight:600; font-size:13px; letter-spacing:0.2em; text-transform:uppercase;\">WhatsApp Business cover<\u002Fspan>\n        <span style=\"font-weight:300; font-size:15px; color:rgba(5,5,5,0.55);\">1640 × 856 upload<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-weight:300; font-size:16px; line-height:1.6; color:rgba(5,5,5,0.7); margin:0 0 40px; max-width:620px;\">The cover sits behind the business name and profile bubble at the top of the chat profile. Kept calm and centred so the overlay UI never fights the wordmark.<\u002Fp>\n\n      <div class=\"jz-scale-frame\" data-nw=\"1640\" style=\"position:relative; width:984px; max-width:100%; aspect-ratio:1640/856; border-radius:14px; overflow:hidden; box-shadow:0 30px 60px -34px rgba(5,5,5,0.5);\">\n        <div class=\"jz-scale-inner\" style=\"width:1640px; height:856px; transform:scale(0.6); transform-origin:top left; background:#050505; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:48px; padding:120px;\">\n          <img src=\"5453bb49-b98a-44b5-839c-702e5f7ef591\" alt=\"JIGZO\" style=\"height:116px; width:auto; display:block;\">\n          <p style=\"font-weight:300; font-size:40px; line-height:1.35; color:rgba(250,248,236,0.74); margin:0; text-align:center; max-width:1100px;\">The gift that ends in a message.<\u002Fp>\n          <span style=\"font-weight:500; font-size:26px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(250,248,236,0.45);\">jigzo.biz<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ guides }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute; left:50%; top:8%; width:150px; height:150px; transform:translateX(-50%); border-radius:50%; border:2px dashed rgba(210,166,91,0.65); pointer-events:none;\"><\u002Fdiv>\n          <span style=\"position:absolute; left:50%; top:calc(8% + 162px); transform:translateX(-50%); font-size:13px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:rgba(210,166,91,0.9); pointer-events:none;\">avatar overlay<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;guides&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Display&quot;}}\">class Component extends DCLogic {\n  componentDidMount() {\n    const fit = () => {\n      document.querySelectorAll('.jz-scale-frame').forEach((frame) => {\n        const inner = frame.querySelector('.jz-scale-inner');\n        if (!inner) return;\n        const nw = parseFloat(frame.getAttribute('data-nw')) || 1640;\n        const s = frame.clientWidth / nw;\n        inner.style.transform = 'scale(' + s + ')';\n      });\n    };\n    this._ro = new ResizeObserver(fit);\n    document.querySelectorAll('.jz-scale-frame').forEach((f) => this._ro.observe(f));\n    fit();\n    window.addEventListener('resize', fit);\n    this._fit = fit;\n  }\n  componentWillUnmount() {\n    if (this._ro) this._ro.disconnect();\n    if (this._fit) window.removeEventListener('resize', this._fit);\n  }\n  renderVals() {\n    return { guides: this.props.guides };\n  }\n}<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
